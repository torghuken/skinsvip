<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKINS VIP – Topp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #070707; --s1: #0f0f0f; --s2: #161616;
      --gold: #C9A040; --gold-dim: rgba(201,160,64,0.1); --silver: #C0C0C0; --bronze: #CD7F32;
      --pink: #C84466; --text: #EDE8E0; --muted: #66665e; --sub: #999890;
      --border: rgba(201,160,64,0.13); --border-s: rgba(255,255,255,0.05);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
    .nav { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 58px; background: rgba(7,7,7,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-logo { height: 32px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    #nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--pink)); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 700; color: #000; }
    .nav-logout { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: 'Outfit', sans-serif; }

    /* HEADER */
    .header { padding: 28px 20px 20px; text-align: center; }
    .header-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; letter-spacing: 1px; }
    .header-sub { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }

    /* SORT TABS */
    .sort-bar { display: flex; gap: 0; padding: 0 16px 16px; }
    .sort-btn { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); cursor: pointer; border: 1px solid var(--border-s); background: var(--s1); transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .sort-btn:first-child { border-radius: 10px 0 0 10px; }
    .sort-btn:last-child { border-radius: 0 10px 10px 0; }
    .sort-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 700; }

    /* PODIUM */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; padding: 0 16px 24px; }
    .podium-item { flex: 1; max-width: 120px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .podium-av { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; color: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .podium-item:nth-child(1) .podium-av { width: 54px; height: 54px; font-size: 22px; background: var(--silver); }
    .podium-item:nth-child(2) .podium-av { width: 68px; height: 68px; font-size: 28px; background: linear-gradient(135deg, var(--gold), #E8C96A); box-shadow: 0 6px 28px rgba(201,160,64,0.35); }
    .podium-item:nth-child(3) .podium-av { width: 50px; height: 50px; font-size: 20px; background: var(--bronze); }
    .podium-name { font-size: 11px; font-weight: 600; text-align: center; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .podium-pts { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 700; }
    .podium-item:nth-child(1) .podium-pts { color: var(--silver); }
    .podium-item:nth-child(2) .podium-pts { color: var(--gold); }
    .podium-item:nth-child(3) .podium-pts { color: var(--bronze); }
    .podium-base { width: 100%; text-align: center; border-radius: 8px 8px 0 0; padding: 8px 0 4px; font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; border-bottom: none; }
    .podium-item:nth-child(1) .podium-base { height: 60px; background: rgba(192,192,192,0.08); color: var(--silver); border: 1px solid rgba(192,192,192,0.15); border-bottom: none; }
    .podium-item:nth-child(2) .podium-base { height: 80px; background: rgba(201,160,64,0.08); color: var(--gold); border: 1px solid rgba(201,160,64,0.2); border-bottom: none; }
    .podium-item:nth-child(3) .podium-base { height: 48px; background: rgba(205,127,50,0.08); color: var(--bronze); border: 1px solid rgba(205,127,50,0.15); border-bottom: none; }

    /* Divider */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 0 16px 16px; }

    /* LIST */
    .lb-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
    .lb-row { display: flex; align-items: center; gap: 12px; background: var(--s1); border: 1px solid var(--border-s); border-radius: 14px; padding: 13px 16px; transition: background 0.15s; }
    .lb-row.is-me { background: var(--gold-dim); border-color: var(--border); }
    .lb-num { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; min-width: 26px; text-align: center; }
    .lb-av { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 700; color: #000; flex-shrink: 0; }
    .lb-info { flex: 1; }
    .lb-name { font-size: 14px; font-weight: 500; }
    .lb-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .lb-right { text-align: right; }
    .lb-val { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; }
    .lb-badge { font-size: 10px; letter-spacing: 0.5px; color: var(--muted); margin-top: 2px; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(7,7,7,0.88); backdrop-filter: blur(24px); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 9px; color: var(--muted); text-decoration: none; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; gap: 4px; transition: color 0.2s; }
    .bottom-nav a .icon { font-size: 19px; }
    .bottom-nav a.active { color: var(--gold); }
  </style>
</head>
<body>
  <nav class="nav">
    <img src="logo.png" alt="SKINS" class="nav-logo">
    <div class="nav-right">
      <div id="nav-avatar">?</div>
      <button class="nav-logout" onclick="handleLogout()">Logg ut</button>
    </div>
  </nav>

  <div class="header">
    <div class="header-title">Rangering</div>
    <div class="header-sub">SKINS VIP Ambassadører</div>
  </div>

  <div class="sort-bar">
    <button class="sort-btn active" onclick="switchTab('points', this)">Poeng</button>
    <button class="sort-btn" onclick="switchTab('guests', this)">Gjester</button>
    <button class="sort-btn" onclick="switchTab('bookings', this)">Bookinger</button>
  </div>

  <div class="podium" id="podium"></div>
  <div class="divider"></div>
  <div class="lb-list" id="leaderboard-list"><div style="text-align:center;padding:24px;color:var(--muted);font-style:italic">Laster…</div></div>

  <nav class="bottom-nav">
    <a href="ambassador.html"><span class="icon">🏠</span>Hjem</a>
    <a href="leaderboard.html" class="active"><span class="icon">🏆</span>Topp</a>
    <a href="bookings.html"><span class="icon">📋</span>Bookinger</a>
    <a href="profile.html"><span class="icon">👤</span>Profil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null, allProfiles = [], currentSort = 'points';

    const LEVELS = [
      { name:'Bronze', min:0 }, { name:'Silver', min:500 }, { name:'Gold', min:1500 },
      { name:'Platinum', min:3000 }, { name:'Diamond', min:6000 }
    ];
    function getLevel(pts) { return [...LEVELS].reverse().find(l => pts >= l.min)?.name || 'Bronze'; }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      await loadLeaderboard();
      document.getElementById('nav-avatar').textContent = '?';
      const { data: me } = await sb.from('profiles').select('full_name').eq('id', currentUser.id).single();
      if (me) document.getElementById('nav-avatar').textContent = (me.full_name||'A')[0].toUpperCase();

      sb.channel('leaderboard').on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, () => loadLeaderboard()).subscribe();
      setInterval(loadLeaderboard, 30000);
    }

    async function loadLeaderboard() {
      const sortCol = currentSort === 'points' ? 'total_points' : currentSort === 'guests' ? 'total_guests' : 'total_bookings';
      const { data } = await sb.from('profiles').select('id,full_name,total_points,total_guests,total_bookings,rank').eq('role','ambassador').order(sortCol, { ascending: false });
      allProfiles = data || [];
      renderLeaderboard();
    }

    function switchTab(sort, btn) {
      currentSort = sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadLeaderboard();
    }

    function renderLeaderboard() {
      const valFn = p => currentSort === 'points' ? (p.total_points||0) : currentSort === 'guests' ? (p.total_guests||0) : (p.total_bookings||0);
      const sorted = [...allProfiles].sort((a, b) => valFn(b) - valFn(a));
      const lbl = currentSort === 'points' ? 'pts' : currentSort === 'guests' ? 'gjester' : 'bookinger';

      // Podium: always show in order 2nd, 1st, 3rd
      const top3 = sorted.slice(0, 3);
      const medals = ['🥇','🥈','🥉'];
      const podiumColors = ['linear-gradient(135deg,#C9A040,#E8C96A)', 'rgba(192,192,192,0.9)', 'rgba(205,127,50,0.9)'];
      const displayOrder = top3.length >= 3 ? [1, 0, 2] : top3.length === 2 ? [1, 0] : [0];
      document.getElementById('podium').innerHTML = displayOrder.map(idx => {
        const p = top3[idx];
        if (!p) return '';
        const isCenter = idx === 0;
        return `<div class="podium-item${isCenter ? ' podium-first' : ''}">
          <div class="podium-av" style="background:${podiumColors[idx]}">${(p.full_name||'A')[0].toUpperCase()}</div>
          <div class="podium-name">${p.full_name||'—'}</div>
          <div class="podium-pts">${valFn(p).toLocaleString('no')}</div>
          <div class="podium-base">${medals[idx]}</div>
        </div>`;
      }).join('');

      // Full list from rank 4+
      const rest = sorted.slice(3);
      document.getElementById('leaderboard-list').innerHTML = rest.map((p, i) => {
        const rank = i + 4;
        const isMe = p.id === currentUser?.id;
        const avatarBg = isMe ? 'linear-gradient(135deg,var(--gold),var(--pink))' : `hsl(${(p.full_name||'').charCodeAt(0)*7%360},30%,25%)`;
        const avatarColor = isMe ? '#000' : 'var(--text)';
        return `<div class="lb-row${isMe?' is-me':''}">
          <div class="lb-num" style="color:var(--muted)">${rank}</div>
          <div class="lb-av" style="background:${avatarBg};color:${avatarColor}">${(p.full_name||'A')[0].toUpperCase()}</div>
          <div class="lb-info">
            <div class="lb-name">${p.full_name||'—'}${isMe?' <span style="font-size:10px;color:var(--gold)">(deg)</span>':''}</div>
            <div class="lb-detail">${getLevel(p.total_points||0)} · ${p.total_guests||0} gjester</div>
          </div>
          <div class="lb-right">
            <div class="lb-val" style="color:${isMe?'var(--gold)':'var(--text)'}">${(valFn(p)||0).toLocaleString('no')}</div>
            <div class="lb-badge">${lbl}</div>
          </div>
        </div>`;
      }).join('') || '';
    }

    async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }
    init();
  </script>
</body>
</html>
