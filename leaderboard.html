<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKINS VIP &ndash; Rangering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
    :root { --gold: #C9A84C; --gold-light: #E8C97A; --pink: #E879A0; --bg: #080808; --card: #111111; --border: #1f1f1f; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .gold { color: var(--gold); }
    .nav { background: #0d0d0d; border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
    .nav-links a { color: #888; text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 6px; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); background: rgba(201,168,76,0.08); }
    .main { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--pink)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #000; flex-shrink: 0; }
    .nav-avatar { width: 36px; height: 36px; font-size: 14px; }
    .podium { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 12px; margin-bottom: 40px; align-items: end; }
    .podium-item { text-align: center; }
    .podium-card {
      border-radius: 12px; padding: 20px 12px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      border: 1px solid var(--border);
    }
    .podium-card.first { background: linear-gradient(to bottom, rgba(201,168,76,0.15), rgba(201,168,76,0.05)); border-color: rgba(201,168,76,0.3); }
    .podium-card.second { background: linear-gradient(to bottom, rgba(192,192,192,0.1), rgba(192,192,192,0.03)); border-color: rgba(192,192,192,0.2); }
    .podium-card.third { background: linear-gradient(to bottom, rgba(205,127,50,0.1), rgba(205,127,50,0.03)); border-color: rgba(205,127,50,0.2); }
    .rank-crown { font-size: 28px; }
    .podium-name { font-size: 13px; font-weight: 600; }
    .podium-pts { font-size: 20px; font-weight: 700; color: var(--gold); }
    .podium-label { font-size: 11px; color: #555; }
    .leaderboard-row {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border-radius: 10px; border: 1px solid var(--border); background: #0d0d0d;
      margin-bottom: 8px; transition: all 0.2s;
    }
    .leaderboard-row:hover { border-color: #2a2a2a; }
    .leaderboard-row.me { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.05); }
    .rank-num { width: 32px; text-align: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .stat-mini { text-align: center; flex-shrink: 0; }
    .stat-mini-val { font-size: 15px; font-weight: 600; }
    .stat-mini-lbl { font-size: 10px; color: #555; text-transform: uppercase; }
    .level-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; border: 1px solid #1a1a1a; transition: all 0.2s; }
    .tab.active { color: var(--gold); border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.08); }
    @media(max-width:600px) { .nav-links { display: none; } .podium { grid-template-columns: 1fr 1.2fr 1fr; } }
  </style>
<style>
  .period-tabs { display:flex; justify-content:center; gap:8px; margin-bottom:16px; }
  .period-tab { padding:6px 18px; border-radius:20px; border:1px solid var(--border); background:transparent; color:#888; font-size:13px; cursor:pointer; transition:all 0.2s; }
  .period-tab:hover { color:#ccc; border-color:#333; }
  .period-tab.active { background:rgba(201,168,76,0.15); border-color:rgba(201,168,76,0.5); color:var(--gold); font-weight:600; }
  .period-label { text-align:center; font-size:12px; color:#555; margin-bottom:20px; letter-spacing:0.05em; text-transform:uppercase; }
</style>
</head>
<body>
<nav class="nav">
  <div class="flex items-center gap-3">
    <div class="font-display text-xl font-bold gold">SKINS</div>
    <span>VIP</span>
  </div>
  <div class="nav-links flex gap-1">
    <a href="ambassador.html">Dashboard</a>
    <a href="bookings.html">Bookinger</a>
    <a href="leaderboard.html" class="active">Rangering</a>
    <a href="register.html">Aktivitet</a>
  </div>
  <div class="flex items-center gap-3">
    <div id="nav-avatar" class="avatar nav-avatar"></div>
    <button onclick="handleLogout()">Logg ut</button>
  </div>
</nav>
<main class="main">
  <div class="mb-8 text-center">
    <h1 class="font-display text-3xl mb-2">&#127942; Ambassador Rangering</h1>
    <p>Se hvem som topper lista og klatre mot toppen</p>
  </div>

  <div class="period-tabs">
    <button class="period-tab active" data-period="total">Totalt</button>
    <button class="period-tab" data-period="year">&#128197; &#197;r</button>
    <button class="period-tab" data-period="month">&#128336; M&#229;ned</button>
    <button class="period-tab" data-period="week">&#9889; Uke</button>
  </div>
  <div id="period-label" class="period-label">Alle tider</div>

  <div class="tabs justify-center" id="sort-tabs">
    <div class="tab active" data-tab="points">Poeng</div>
    <div class="tab" data-tab="guests">Gjester</div>
    <div class="tab" data-tab="bookings">Bookinger</div>
  </div>

  <div id="podium" class="podium mb-8"></div>
  <div>
    <div class="text-sm mb-3" style="color:#555;text-transform:uppercase;letter-spacing:0.08em;">ALLE AMBASSAD&#216;RER</div>
    <div id="list"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentTab = 'points';
let currentPeriod = 'total';
let leaderboardData = [];

async function init() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  const { data: profile } = await db.from('profiles').select('full_name').eq('id', user.id).single();
  if (profile) document.getElementById('nav-avatar').textContent = profile.full_name.charAt(0).toUpperCase();
  await loadLeaderboard();
}

function getPeriodStart(period) {
  const now = new Date();
  if (period === 'week') {
    const d = new Date(now);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0,0,0,0);
    return d.toISOString();
  }
  if (period === 'month') return new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  if (period === 'year')  return new Date(now.getFullYear(), 0, 1).toISOString();
  return null;
}

function getPeriodLabel(period) {
  const months = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
  if (period === 'total') return 'Alle tider';
  if (period === 'week')  return 'Denne uken';
  if (period === 'month') return months[new Date().getMonth()] + ' ' + new Date().getFullYear();
  if (period === 'year')  return 'Hele ' + new Date().getFullYear();
  return '';
}

async function loadLeaderboard() {
  const since = getPeriodStart(currentPeriod);

  if (!since) {
    const { data } = await supabase
      .from('profiles')
      .select('id, full_name, total_points, total_guests, total_bookings, role')
      .neq('role', 'admin')
      .neq('role', 'super_admin')
      .order('total_points', { ascending: false });
    leaderboardData = (data || []).map(p => ({
      id: p.id, name: p.full_name,
      points: p.total_points || 0,
      guests: p.total_guests || 0,
      bookings: p.total_bookings || 0
    }));
  } else {
    const [{ data: profiles }, { data: guestData }, { data: barData }] = await Promise.all([
      db.from('profiles').select('id, full_name, role').neq('role', 'admin').neq('role', 'super_admin'),
      db.from('guest_registrations').select('ambassador_id, total_points, guest_count').gte('registered_at', since),
      db.from('bar_registrations').select('ambassador_id, base_points, threshold_bonus').gte('registered_at', since)
    ]);
    const map = {};
    (profiles || []).forEach(p => { map[p.id] = { id: p.id, name: p.full_name, points: 0, guests: 0, bookings: 0 }; });
    (guestData || []).forEach(r => {
      if (map[r.ambassador_id]) {
        map[r.ambassador_id].points += (r.total_points || 0);
        map[r.ambassador_id].guests += (r.guest_count || 0);
      }
    });
    (barData || []).forEach(r => {
      if (map[r.ambassador_id]) {
        map[r.ambassador_id].points += (r.base_points || 0) + (r.threshold_bonus || 0);
        map[r.ambassador_id].bookings += 1;
      }
    });
    leaderboardData = Object.values(map).sort((a,b) => b.points - a.points);
  }
  renderLeaderboard();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#sort-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderLeaderboard();
}

function switchPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.toggle('active', t.dataset.period === period));
  document.getElementById('period-label').textContent = getPeriodLabel(period);
  loadLeaderboard();
}

function getLevel(pts) {
  if (pts >= 5000) return { name: 'Gold',   color: 'var(--gold)', icon: '&#127941;' };
  if (pts >= 2000) return { name: 'Silver',  color: '#aaa',        icon: '&#9876;' };
  return              { name: 'Bronze', color: '#cd7f32',    icon: '&#127869;' };
}

function getSortValue(d) {
  if (currentTab === 'guests')   return d.guests;
  if (currentTab === 'bookings') return d.bookings;
  return d.points;
}

function getSortLabel() {
  if (currentTab === 'guests')   return 'gjester';
  if (currentTab === 'bookings') return 'book';
  return 'pts';
}

function renderLeaderboard() {
  const sorted = [...leaderboardData].sort((a,b) => getSortValue(b) - getSortValue(a));
  const label  = getSortLabel();

  // Podium
  const order  = [sorted[1], sorted[0], sorted[2]];
  const cls    = ['second','first','third'];
  const crowns = ['&#129352;','&#129351;','&#129353;'];
  document.getElementById('podium').innerHTML = order.map((p,i) => {
    if (!p) return '<div class="podium-item"></div>';
    const isMe = p.id === currentUser.id;
    return '<div class="podium-item"><div class="podium-card ' + cls[i] + '">' +
      '<div class="rank-crown">' + crowns[i] + '</div>' +
      '<div class="avatar">' + p.name.charAt(0).toUpperCase() + '</div>' +
      '<div class="podium-name">' + p.name + (isMe ? ' &#11088;' : '') + '</div>' +
      '<div class="podium-pts">' + getSortValue(p).toLocaleString('no') + '</div>' +
      '<div class="podium-label">' + label + '</div>' +
      '</div></div>';
  }).join('');

  // List
  document.getElementById('list').innerHTML = sorted.map((p,i) => {
    const isMe  = p.id === currentUser.id;
    const lv    = getLevel(p.points);
    const medal = i === 0 ? '&#129351;' : i === 1 ? '&#129352;' : i === 2 ? '&#129353;' : (i+1);
    return '<div class="leaderboard-row' + (isMe ? ' me' : '') + '">' +
      '<div class="rank-num">' + medal + '</div>' +
      '<div class="avatar">' + p.name.charAt(0).toUpperCase() + '</div>' +
      '<div style="flex:1">' +
        '<div style="font-weight:600;font-size:14px">' + p.name + (isMe ? ' <span style=\"color:var(--gold)\">(deg)</span>' : '') + '</div>' +
        '<span class="level-badge" style="background:rgba(0,0,0,0.3);border:1px solid ' + lv.color + ';color:' + lv.color + '">' + lv.icon + ' ' + lv.name + '</span>' +
      '</div>' +
      '<div class="stat-mini"><div class="stat-mini-val gold">' + p.points.toLocaleString('no') + '</div><div class="stat-mini-lbl">Poeng</div></div>' +
      '<div class="stat-mini"><div class="stat-mini-val">' + p.guests + '</div><div class="stat-mini-lbl">Gjester</div></div>' +
      '<div class="stat-mini"><div class="stat-mini-val">' + p.bookings + '</div><div class="stat-mini-lbl">Booking</div></div>' +
    '</div>';
  }).join('');
}

async function handleLogout() {
  await db.auth.signOut();
  window.location.href = 'index.html';
}

document.querySelectorAll('#sort-tabs .tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
document.querySelectorAll('.period-tab').forEach(t => t.addEventListener('click', () => switchPeriod(t.dataset.period)));

init();
</script>
</body>
</html>
