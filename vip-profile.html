<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKINS VIP — Profil</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #070707; --s1: #0f0f0f; --s2: #161616; --s3: #1c1c1c;
      --gold: #C9A040; --gold-dim: rgba(201,160,64,0.1);
      --pink: #C84466; --green: #3CB07A;
      --text: #EDE8E0; --muted: #66665e; --sub: #999890;
      --border: rgba(201,160,64,0.13); --border-s: rgba(255,255,255,0.05);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding-bottom: 80px; }

    .nav { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 58px; background: rgba(7,7,7,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-logo { height: 32px; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-level { font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .nav-level.l1 { background: rgba(201,160,64,0.1); color: var(--gold); border: 1px solid rgba(201,160,64,0.25); }
    .nav-level.l2 { background: rgba(232,201,106,0.15); color: #E8C96A; border: 1px solid rgba(232,201,106,0.3); }
    .nav-level.l3 { background: linear-gradient(135deg, rgba(200,68,102,0.15), rgba(201,160,64,0.15)); color: var(--pink); border: 1px solid rgba(200,68,102,0.3); }
    .nav-level.l4 { background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(201,160,64,0.15)); color: #a855f7; border: 1px solid rgba(168,85,247,0.4); }

    .profile-header { text-align: center; padding: 32px 20px 24px; }
    .avatar { width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--pink)); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 600; color: #000; margin: 0 auto 16px; box-shadow: 0 0 0 1px rgba(201,160,64,0.3), 0 8px 32px rgba(201,160,64,0.15); overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; }
    .level-badge { display: inline-block; margin-top: 8px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 5px 16px; border-radius: 20px; }

    .section { padding: 0 16px; margin-bottom: 16px; }
    .section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 600; padding: 12px 2px 8px; }
    .card { background: var(--s1); border: 1px solid var(--border-s); border-radius: 16px; overflow: hidden; }

    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--border-s); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .info-value { font-size: 14px; font-weight: 500; }
    .info-right { display: flex; align-items: center; gap: 10px; }
    .edit-btn { background: none; border: 1px solid rgba(201,160,64,0.25); color: var(--gold); font-size: 10px; font-family: 'Outfit', sans-serif; letter-spacing: 1px; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .edit-btn:hover { background: rgba(201,160,64,0.1); }
    .edit-input { background: var(--s2); border: 1px solid rgba(201,160,64,0.4); border-radius: 8px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; padding: 8px 12px; outline: none; width: 180px; display: none; }
    .edit-actions { display: none; gap: 6px; }
    .edit-actions button { font-size: 10px; font-family: 'Outfit', sans-serif; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: none; }
    .save-btn { background: var(--gold); color: #000; font-weight: 600; }
    .cancel-btn { background: none; border: 1px solid var(--border-s); color: var(--muted); }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border-s); }
    .stat-cell { background: var(--s1); padding: 18px 16px; text-align: center; }
    .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; }
    .stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

    .pw-section { padding: 18px; }
    .pw-section .fg { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .pw-section .fg label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); }
    .pw-section .fg input { background: var(--s2); border: 1px solid rgba(255,255,255,0.05); border-radius: 11px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 16px; padding: 12px 14px; outline: none; width: 100%; }
    .pw-section .fg input:focus { border-color: rgba(201,160,64,0.5); }

    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #E8C96A); color: #000; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .btn:disabled { opacity: 0.4; }
    .btn-outline { width: 100%; padding: 14px; background: none; color: var(--pink); border: 1px solid rgba(200,68,102,0.3); border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-outline:hover { background: rgba(200,68,102,0.08); }

    .msg { font-size: 12px; text-align: center; padding: 8px; border-radius: 8px; display: none; margin-top: 8px; }
    .msg.ok { color: var(--green); background: rgba(60,176,122,0.08); display: block; }
    .msg.err { color: var(--pink); background: rgba(200,68,102,0.08); display: block; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(7,7,7,0.88); backdrop-filter: blur(24px); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 9px; color: var(--muted); text-decoration: none; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; gap: 4px; transition: color 0.2s; }
    .bottom-nav a .icon { font-size: 19px; }
    .bottom-nav a.active { color: var(--gold); }
  </style>
</head>
<body>
  <nav class="nav">
    <img src="logo.png" alt="SKINS" class="nav-logo">
    <div class="nav-right">
      <span class="nav-level l1" id="nav-level">VIP</span>
    </div>
  </nav>

  <div class="profile-header">
    <div class="avatar" id="p-avatar">?</div>
    <div class="profile-name" id="p-name">VIP</div>
    <div class="level-badge nav-level l1" id="p-level">VIP</div>
  </div>

  <!-- Info -->
  <div class="section">
    <div class="section-title">Kontoinformasjon</div>
    <div class="card">
      <div class="info-row">
        <span class="info-label">Telefon</span>
        <div class="info-right">
          <span class="info-value" id="p-phone">—</span>
          <input class="edit-input" id="edit-phone" type="tel">
          <button class="edit-btn" id="btn-edit-phone" onclick="startEdit('phone')">Endre</button>
          <div class="edit-actions" id="actions-phone">
            <button class="save-btn" onclick="saveField('phone')">Lagre</button>
            <button class="cancel-btn" onclick="cancelEdit('phone')">Avbryt</button>
          </div>
        </div>
      </div>
      <div class="info-row">
        <span class="info-label">E-post</span>
        <div class="info-right">
          <span class="info-value" id="p-email">—</span>
          <input class="edit-input" id="edit-email" type="email">
          <button class="edit-btn" id="btn-edit-email" onclick="startEdit('email')">Endre</button>
          <div class="edit-actions" id="actions-email">
            <button class="save-btn" onclick="saveField('email')">Lagre</button>
            <button class="cancel-btn" onclick="cancelEdit('email')">Avbryt</button>
          </div>
        </div>
      </div>
      <div class="info-row"><span class="info-label">Medlem siden</span><span class="info-value" id="p-since">—</span></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="section-title">Statistikk</div>
    <div class="card">
      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-val" style="color:var(--gold);" id="p-spend">0</div><div class="stat-lbl">Omsetning</div></div>
        <div class="stat-cell"><div class="stat-val" style="color:var(--pink);" id="p-points">0</div><div class="stat-lbl">Poeng</div></div>
        <div class="stat-cell"><div class="stat-val" style="color:var(--green);" id="p-guests">0</div><div class="stat-lbl">Gjester</div></div>
        <div class="stat-cell"><div class="stat-val" id="p-credits">0</div><div class="stat-lbl">Credits</div></div>
      </div>
    </div>
  </div>

  <!-- Change password -->
  <div class="section">
    <div class="section-title">Endre passord</div>
    <div class="card">
      <div class="pw-section">
        <div class="fg"><label>Nytt passord</label><input type="password" id="pw-new" placeholder="Minst 6 tegn"></div>
        <div class="fg"><label>Bekreft passord</label><input type="password" id="pw-confirm" placeholder="Gjenta passord"></div>
        <button class="btn" onclick="changePassword()">Oppdater passord</button>
        <div class="msg" id="pw-msg"></div>
      </div>
    </div>
  </div>

  <!-- Logout -->
  <div class="section" style="margin-top:8px;">
    <button class="btn-outline" onclick="handleLogout()">Logg ut</button>
  </div>

  <nav class="bottom-nav">
    <a href="vip.html"><span class="icon">🏠</span>Hjem</a>
    <a href="vip-profile.html" class="active"><span class="icon">👤</span>Profil</a>
  </nav>

<script>
  const SB_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
  const { createClient } = supabase;
  const sb = createClient(SB_URL, SB_KEY);

  const LEVELS = [
    { name: 'VIP', min: 0, cls: 'l1' },
    { name: 'VIP Gold', min: 5000, cls: 'l2' },
    { name: 'VIP Premium', min: 9000, cls: 'l3' },
    { name: 'VIP Elevate', min: 50000, cls: 'l4' },
  ];

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'vip-login.html'; return; }

    const { data: p } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p || p.role !== 'vip') { window.location.href = 'vip-login.html'; return; }

    // Avatar
    const av = document.getElementById('p-avatar');
    if (p.avatar_url) av.innerHTML = `<img src="${p.avatar_url}" alt="">`;
    else av.textContent = (p.full_name || 'V')[0].toUpperCase();

    // Name + level
    document.getElementById('p-name').textContent = p.full_name || 'VIP';
    const spend = p.monthly_spend || 0;
    const level = [...LEVELS].reverse().find(l => spend >= l.min) || LEVELS[0];
    const storedLevel = p.vip_level || 1;
    const effectiveLevel = LEVELS[Math.max(storedLevel - 1, LEVELS.indexOf(level))];
    ['nav-level', 'p-level'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = effectiveLevel.name;
      el.className = 'nav-level ' + effectiveLevel.cls;
    });

    // Info
    document.getElementById('p-phone').textContent = p.phone || '—';
    document.getElementById('p-email').textContent = p.email || '—';
    const since = p.created_at ? new Date(p.created_at).toLocaleDateString('no-NO', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';
    document.getElementById('p-since').textContent = since;

    // Stats
    document.getElementById('p-spend').textContent = spend.toLocaleString('no') + ' kr';
    document.getElementById('p-points').textContent = (p.total_points || 0).toLocaleString('no');
    document.getElementById('p-guests').textContent = (p.total_guests || 0).toLocaleString('no');
    document.getElementById('p-credits').textContent = (p.credits || 0).toLocaleString('no');
  }

  let currentProfile = null;

  function startEdit(field) {
    const val = document.getElementById('p-' + field);
    const input = document.getElementById('edit-' + field);
    const btn = document.getElementById('btn-edit-' + field);
    const actions = document.getElementById('actions-' + field);
    input.value = val.textContent === '—' ? '' : val.textContent;
    val.style.display = 'none';
    btn.style.display = 'none';
    input.style.display = 'block';
    actions.style.display = 'flex';
    input.focus();
  }

  function cancelEdit(field) {
    document.getElementById('p-' + field).style.display = '';
    document.getElementById('btn-edit-' + field).style.display = '';
    document.getElementById('edit-' + field).style.display = 'none';
    document.getElementById('actions-' + field).style.display = 'none';
  }

  async function saveField(field) {
    const input = document.getElementById('edit-' + field);
    const newVal = input.value.trim();
    if (!newVal) return;

    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;

    const update = {};
    update[field] = newVal;
    const { error } = await sb.from('profiles').update(update).eq('id', session.user.id);
    if (error) { alert('Feil: ' + error.message); return; }

    document.getElementById('p-' + field).textContent = newVal;
    cancelEdit(field);
  }

  async function changePassword() {
    const msg = document.getElementById('pw-msg');
    const pw = document.getElementById('pw-new').value;
    const pw2 = document.getElementById('pw-confirm').value;
    msg.className = 'msg'; msg.style.display = 'none';

    if (!pw || pw.length < 6) { msg.textContent = 'Passord må være minst 6 tegn.'; msg.className = 'msg err'; return; }
    if (pw !== pw2) { msg.textContent = 'Passordene er ikke like.'; msg.className = 'msg err'; return; }

    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) { msg.textContent = error.message; msg.className = 'msg err'; return; }

    msg.textContent = 'Passord oppdatert!';
    msg.className = 'msg ok';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
  }

  async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }
  init();
</script>
</body>
</html>
