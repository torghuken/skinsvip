<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKINS VIP — Logg inn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #070707; --s1: #0f0f0f; --s2: #161616; --gold: #C9A040; --pink: #C84466; --text: #EDE8E0; --muted: #66665e; --border: rgba(201,160,64,0.14); }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }

    .logo { height: 60px; margin-bottom: 8px; }
    .title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; margin-bottom: 4px; text-align: center; }
    .subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 32px; }
    .badge { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); background: rgba(201,160,64,0.1); border: 1px solid rgba(201,160,64,0.25); border-radius: 20px; padding: 5px 14px; margin-bottom: 16px; }

    .panel { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
    .fg { display: flex; flex-direction: column; gap: 6px; }
    .fg label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); }
    .fg input { background: var(--s2); border: 1px solid rgba(255,255,255,0.05); border-radius: 11px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 16px; padding: 14px; outline: none; width: 100%; }
    .fg input:focus { border-color: rgba(201,160,64,0.5); }

    .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold), #E8C96A); color: #000; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .btn:disabled { opacity: 0.4; }

    .err { font-size: 12px; color: var(--pink); display: none; text-align: center; padding: 10px; background: rgba(200,68,102,0.08); border-radius: 9px; }

    .links { display: flex; flex-direction: column; gap: 8px; align-items: center; margin-top: 8px; }
    .links a { font-size: 12px; color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
  <img src="logo.png" class="logo" alt="SKINS">
  <div class="badge">VIP</div>
  <div class="title">Logg inn</div>
  <div class="subtitle">Bruk mobilnummer og passord</div>

  <div class="panel" id="login-panel">
    <div class="fg"><label>Mobilnummer</label><input type="tel" id="vip-phone" placeholder="+47 900 00 000" autocomplete="tel"></div>
    <div class="fg"><label>Passord</label><input type="password" id="vip-pw" placeholder="Ditt passord" autocomplete="current-password"></div>
    <div class="err" id="login-err"></div>
    <button class="btn" id="login-btn" onclick="login()">Logg inn</button>
    <div class="links">
      <a href="vip-apply.html">Har ikke VIP? Sok om tilgang</a>
      <a href="index.html">&larr; Tilbake</a>
    </div>
  </div>

<script>
  const SB_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
  const { createClient } = supabase;
  const sb = createClient(SB_URL, SB_KEY);

  // Check if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      sb.from('profiles').select('role').eq('id', session.user.id).single().then(({ data }) => {
        if (data?.role === 'vip') window.location.href = 'vip.html';
      });
    }
  });

  // Allow Enter key to submit
  document.getElementById('vip-pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('vip-phone').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('vip-pw').focus(); });

  async function login() {
    const btn = document.getElementById('login-btn'), err = document.getElementById('login-err');
    const raw = document.getElementById('vip-phone').value.trim();
    const pw = document.getElementById('vip-pw').value;
    err.style.display = 'none';

    if (!raw) { err.textContent = 'Skriv inn mobilnummer.'; err.style.display = 'block'; return; }
    if (!pw) { err.textContent = 'Skriv inn passord.'; err.style.display = 'block'; return; }

    const phone = raw.startsWith('+') ? raw.replace(/\s/g, '') : '+47' + raw.replace(/\s/g, '');
    btn.disabled = true; btn.textContent = 'Logger inn...';

    const { data, error } = await sb.auth.signInWithPassword({ phone, password: pw });
    if (error) {
      err.textContent = 'Feil mobilnummer eller passord.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Logg inn';
      return;
    }

    // Verify this is a VIP user
    const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
    if (!profile || profile.role !== 'vip') {
      await sb.auth.signOut();
      err.textContent = 'Denne kontoen er ikke en VIP-konto.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Logg inn';
      return;
    }

    window.location.href = 'vip.html';
  }
</script>
</body>
</html>
