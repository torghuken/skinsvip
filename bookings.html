<!DOCTYPE html>
<html lang="no">
<!-- v2 -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKINS VIP – Bookinger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #070707; --s1: #0f0f0f; --s2: #161616; --s3: #1d1d1d;
      --gold: #C9A040; --gold-dim: rgba(201,160,64,0.1);
      --pink: #C84466; --green: #34d399; --text: #EDE8E0;
      --muted: #66665e; --sub: #999890; --border: rgba(201,160,64,0.13);
      --border-s: rgba(255,255,255,0.05);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
    .nav { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 58px; background: rgba(7,7,7,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-logo { height: 32px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    #nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--pink)); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 700; color: #000; }
    .nav-logout { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: 'Outfit', sans-serif; }

    /* Filter tabs */
    .filter-bar { display: flex; gap: 8px; padding: 16px 16px 0; overflow-x: auto; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; background: var(--s1); border: 1px solid var(--border-s); color: var(--muted); cursor: pointer; font-family: 'Outfit', sans-serif; transition: all 0.2s; }
    .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }

    /* Bookings list */
    .bookings-list { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .booking-card { background: var(--s1); border: 1px solid var(--border-s); border-radius: 16px; overflow: hidden; border-left: 3px solid var(--muted); transition: border-color 0.2s; }
    .booking-card.pending { border-left-color: var(--gold); }
    .booking-card.approved { border-left-color: var(--green); }
    .booking-card.rejected { border-left-color: var(--pink); }
    .booking-inner { padding: 16px; }
    .booking-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .booking-event { font-size: 15px; font-weight: 600; }
    .status-badge { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .status-badge.pending { background: rgba(201,160,64,0.12); color: var(--gold); }
    .status-badge.approved { background: rgba(52,211,153,0.12); color: var(--green); }
    .status-badge.rejected { background: rgba(200,68,102,0.12); color: var(--pink); }
    .booking-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .meta-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--sub); background: var(--s2); padding: 4px 10px; border-radius: 20px; }
    .booking-notes { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-s); }
    .booking-qr { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-s); }
    .booking-qr-wrap { background: #fff; border-radius: 10px; padding: 8px; display: inline-block; }
    .booking-qr-wrap canvas { display: block; }
    .booking-qr-label { font-size: 11px; color: var(--green); font-weight: 500; letter-spacing: 0.5px; }
    .booking-qr-hint { font-size: 10px; color: var(--muted); }
    .checked-in-badge { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding: 10px 14px; background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); border-radius: 10px; font-size: 12px; color: var(--green); font-weight: 500; }
    .empty { padding: 48px 20px; text-align: center; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; margin-bottom: 6px; cursor: default; }
    .section-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
    .section-toggle { width: 28px; height: 28px; border-radius: 50%; background: var(--s2); border: 1px solid var(--border-s); color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .section-toggle:hover { color: var(--gold); border-color: var(--gold); }
    .past-list { overflow: hidden; transition: max-height 0.3s ease; }
    .past-list.collapsed { max-height: 0 !important; }

    /* FAB */
    .new-booking-btn { font-size: 12px; font-weight: 600; color: #000; background: var(--gold); border: none; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-family: 'Outfit', sans-serif; letter-spacing: 0.5px; transition: all 0.2s; }
    .new-booking-btn:hover { box-shadow: 0 4px 12px rgba(201,160,64,0.3); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { width: 100%; max-width: 500px; background: var(--s1); border-radius: 24px 24px 0 0; border: 1px solid var(--border); border-bottom: none; padding: 28px 24px 40px; animation: slideUp 0.35s cubic-bezier(0.22,1,0.36,1); max-height: 90vh; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 3px; background: var(--border); border-radius: 3px; margin: 0 auto 20px; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; margin-bottom: 22px; }
    .form { display: flex; flex-direction: column; gap: 16px; }
    .fg { display: flex; flex-direction: column; gap: 7px; }
    .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); }
    input, select, textarea { background: var(--s2); border: 1px solid rgba(255,255,255,0.05); border-radius: 11px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; padding: 12px 14px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    input:focus, select:focus, textarea:focus { border-color: rgba(201,160,64,0.5); }
    textarea { resize: none; height: 80px; }
    .err { font-size: 12px; color: #E05070; display: none; padding: 9px 12px; background: rgba(224,80,112,0.08); border-radius: 9px; }
    .err.show { display: block; }
    .btn-row { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

    /* Toast & Bottom Nav */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--s3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 300; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(7,7,7,0.88); backdrop-filter: blur(24px); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 9px; color: var(--muted); text-decoration: none; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; gap: 4px; transition: color 0.2s; }
    .bottom-nav a .icon { font-size: 19px; }
    .bottom-nav a.active { color: var(--gold); }
  </style>
</head>
<body>
  <nav class="nav">
    <img src="logo.png" alt="SKINS" class="nav-logo">
    <div class="nav-right">
      <div id="nav-avatar">?</div>
      <button class="nav-logout" onclick="handleLogout()">Logg ut</button>
    </div>
  </nav>

  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;">
    <div class="filter-bar" style="padding:0;">
      <button class="filter-btn active" id="filter-all" onclick="filterBookings('all', this)">Alle</button>
      <button class="filter-btn" id="filter-pending" onclick="filterBookings('pending', this)">Venter</button>
      <button class="filter-btn" id="filter-approved" onclick="filterBookings('approved', this)">Godkjent</button>
      <button class="filter-btn" id="filter-rejected" onclick="filterBookings('rejected', this)">Avvist</button>
    </div>
    <button class="new-booking-btn" onclick="openModal()">+ Ny booking</button>
  </div>

  <div class="bookings-list" id="bookings-list">
    <div class="empty">Laster bookinger…</div>
  </div>


  <!-- Modal -->
  <div class="modal-overlay" id="booking-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Ny booking</div>
      <div class="form">
        <div class="fg"><label>Arrangementsnavn</label><input type="text" id="b-event" placeholder="F.eks. Bursdag – Lørdag 22. mars"></div>
        <div class="fg"><label>Dato</label><input type="date" id="b-date"></div>
        <div class="fg-row">
          <div class="fg"><label>Antall menn</label><input type="number" id="b-men" value="0" min="0" onfocus="this.select()"></div>
          <div class="fg"><label>Antall kvinner</label><input type="number" id="b-women" value="0" min="0" onfocus="this.select()"></div>
        </div>
        <div class="fg"><label>Gjestens telefon (for QR på SMS)</label><input type="tel" id="b-phone" placeholder="+47 900 00 000" autocomplete="tel"></div>
        <div class="fg-row">
          <div class="fg"><label>Bordtype</label>
            <select id="b-table">
              <option value="">Ingen</option>
              <option value="bord">Bord</option>
              <option value="vip">VIP</option>
            </select>
          </div>
          <div class="fg"><label>Forventet forbruk (kr)</label><input type="number" id="b-spend" value="0" min="0" onfocus="this.select()"></div>
        </div>
        <div class="fg"><label>Notater</label><textarea id="b-notes" placeholder="Spesielle ønsker, anledning, drikke klar på bordet, osv."></textarea></div>
        <div class="err" id="booking-error"></div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="closeModal()">Avbryt</button>
          <button class="btn" id="submit-btn" onclick="submitBooking()">Send inn</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <a href="ambassador.html"><span class="icon">🏠</span>Hjem</a>
    <a href="leaderboard.html"><span class="icon">🏆</span>Topp</a>
    <a href="bookings.html" class="active"><span class="icon">📋</span>Bookinger</a>
    <a href="profile.html"><span class="icon">👤</span>Profil</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null, allBookings = [], currentFilter = 'all', myName = '';

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      sb.from('profiles').select('full_name').eq('id', currentUser.id).single().then(({data:_p}) => {
        if (_p) { myName = _p.full_name || ''; document.getElementById('nav-avatar').textContent = (myName||'A')[0].toUpperCase(); }
      });
      await loadBookings();
      sb.channel('my-bookings').on('postgres_changes', { event:'*', schema:'public', table:'bookings', filter:`ambassador_id=eq.${currentUser.id}` }, () => loadBookings()).subscribe();
    }

    async function loadBookings() {
      const { data } = await sb.from('bookings').select('*').eq('ambassador_id', currentUser.id).order('event_date', { ascending: true });
      allBookings = data || [];
      renderBookings();
    }

    function filterBookings(status, btn) {
      currentFilter = status;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderBookings();
    }

    let pastExpanded = false;

    function renderBookings() {
      const list = document.getElementById('bookings-list');
      const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);
      if (!filtered.length) { list.innerHTML = '<div class="empty">Ingen bookinger her ennå</div>'; return; }

      // Cutoff er event_date + 2 timer
      const now = new Date();
      const isPast = (b) => { if (!b.event_date) return false; const cutoff = new Date(b.event_date); cutoff.setHours(cutoff.getHours() + 2); return now >= cutoff; };
      const dateVal = b => new Date(b.event_date || 0).getTime();
      const upcoming = filtered.filter(b => !isPast(b)).sort((a, b) => dateVal(a) - dateVal(b));
      const past = filtered.filter(b => isPast(b)).sort((a, b) => dateVal(b) - dateVal(a));

      let html = upcoming.length ? `<div class="section-header"><span class="section-label">Kommende</span></div>` : '';

      if (upcoming.length) {
        html += upcoming.map(renderCard).join('');
      } else if (!past.length) {
        html += '<div class="empty">Ingen bookinger her ennå</div>';
      }

      if (past.length) {
        html += `<div class="section-header"><span class="section-label">Tidligere (${past.length})</span><button class="section-toggle" onclick="togglePast()">${pastExpanded ? '−' : '+'}</button></div>`;
        html += `<div class="past-list ${pastExpanded ? '' : 'collapsed'}" id="past-list" style="max-height:${pastExpanded ? past.length * 200 + 'px' : '0'};">` + past.map(renderCard).join('') + '</div>';
      }
      list.innerHTML = html;
      setTimeout(generateBookingQRs, 100);
    }

    function renderCard(b) {
      const statusLabel = { pending:'Venter', approved:'Godkjent', rejected:'Avvist' };
      const date = b.event_date ? new Date(b.event_date).toLocaleDateString('no-NO', { day:'numeric', month:'long', year:'numeric' }) : '—';
      const created = new Date(b.created_at).toLocaleDateString('no-NO', { day:'numeric', month:'short' });
      let qrHtml = '';
      if (b.checked_in) {
        qrHtml = `<div class="checked-in-badge">✅ Innsjekket · ${b.actual_guests||b.guest_count} gjester ankom</div>`;
      } else if (b.booking_token && b.status !== 'rejected') {
        const label = b.status === 'approved' ? '✅ Vis QR i døra' : '⏳ QR klar — venter på godkjenning';
        const hint = b.status === 'approved' ? 'Gjestene viser denne til dørvakt' : 'QR aktiveres når bookingen godkjennes';
        qrHtml = `<div class="booking-qr">
          <div class="booking-qr-label">${label}</div>
          <div class="booking-qr-wrap"><canvas id="qr-${b.id}" width="140" height="140"></canvas></div>
          <div class="booking-qr-hint">${hint}</div>
        </div>`;
      }
      return `<div class="booking-card ${b.status||'pending'}">
        <div class="booking-inner">
          <div class="booking-top">
            <div class="booking-event">${b.event_name||'Arrangement'}</div>
            <span class="status-badge ${b.status||'pending'}">${statusLabel[b.status]||'Venter'}</span>
          </div>
          <div class="booking-meta">
            <span class="meta-chip">📅 ${date}</span>
            <span class="meta-chip">👥 ${b.guest_count||'—'} gjester</span>
            ${b.expected_spend ? `<span class="meta-chip">💳 ${Number(b.expected_spend).toLocaleString('no')} kr</span>` : ''}
            <span class="meta-chip">📤 ${created}</span>
          </div>
          ${b.notes ? `<div class="booking-notes">${b.notes}</div>` : ''}
          ${qrHtml}
        </div>
      </div>`;
    }

    function generateBookingQRs() {
      if (typeof QRious === 'undefined') { setTimeout(generateBookingQRs, 300); return; }
      allBookings.filter(b => b.booking_token && !b.checked_in && b.status !== 'rejected').forEach(b => {
        const canvas = document.getElementById('qr-' + b.id);
        if (!canvas || canvas.dataset.done) return;
        const url = `${window.location.origin}/checkin.html?token=${b.booking_token}`;
        new QRious({ element: canvas, value: url, size: 140, background: '#FFFFFF', foreground: '#000000', level: 'M' });
        canvas.dataset.done = '1';
      });
    }

    function togglePast() {
      pastExpanded = !pastExpanded;
      renderBookings();
    }

    function openModal() {
      document.getElementById('booking-modal').classList.add('open');
      document.getElementById('b-date').value = new Date().toISOString().split('T')[0];
    }
    function closeModal() { document.getElementById('booking-modal').classList.remove('open'); }

    async function submitBooking() {
      const btn = document.getElementById('submit-btn'), err = document.getElementById('booking-error');
      const event_name = document.getElementById('b-event').value.trim();
      const event_date = document.getElementById('b-date').value;
      const men = parseInt(document.getElementById('b-men').value) || 0;
      const women = parseInt(document.getElementById('b-women').value) || 0;
      const guest_count = men + women;
      const table_type = document.getElementById('b-table').value;
      const expected_spend = parseFloat(document.getElementById('b-spend').value) || 0;
      const rawNotes = document.getElementById('b-notes').value.trim();
      const notes = table_type ? `[${table_type.toUpperCase()}] ${rawNotes}` : rawNotes;
      err.classList.remove('show');
      if (!event_name) { err.textContent = 'Skriv inn arrangementsnavn.'; err.classList.add('show'); return; }
      if (!event_date) { err.textContent = 'Velg en dato.'; err.classList.add('show'); return; }
      btn.disabled = true; btn.textContent = 'Sender…';
      const guest_phone = document.getElementById('b-phone').value.trim();
      const booking_token = crypto.randomUUID();
      const guest_phone_val = guest_phone;
      const booking_token_val = booking_token;
      const { data: inserted, error } = await sb.from('bookings').insert({ ambassador_id: currentUser.id, event_name, event_date, guest_count, expected_spend, notes, guest_phone: guest_phone_val || null, status: 'pending', booking_token: booking_token_val }).select('id').single();
      if (error) { err.textContent = error.message; err.classList.add('show'); btn.disabled = false; btn.textContent = 'Send inn'; return; }
      btn.textContent = 'Sender SMS…';
      try {
        const smsRes = await fetch(window.location.origin + '/api/sms-notify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
          event_name, event_date, guest_count, men, women, table_type, expected_spend, notes,
          ambassador_name: myName, booking_id: inserted?.id
        }) });
        if (!smsRes.ok) console.error('SMS response:', await smsRes.text());
      } catch(e) { console.error('SMS feil:', e); }
      closeModal();
      resetForm();
      showToast('✅ Booking opprettet — SMS sendt til daglig leder');
      btn.disabled = false; btn.textContent = 'Send inn';
      await loadBookings();
    }

    function resetForm() {
      document.getElementById('b-event').value = '';
      document.getElementById('b-date').value = '';
      document.getElementById('b-men').value = '0';
      document.getElementById('b-women').value = '0';
      document.getElementById('b-phone').value = '';
      document.getElementById('b-table').value = '';
      document.getElementById('b-spend').value = '0';
      document.getElementById('b-notes').value = '';
      document.getElementById('booking-error').classList.remove('show');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }
    init();
  </script>
</body>
</html>
