<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKINS VIP — Opprett konto</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #070707; --s1: #0f0f0f; --s2: #161616; --gold: #C9A040; --gold-dim: rgba(201,160,64,0.1); --pink: #C84466; --text: #EDE8E0; --muted: #66665e; --border: rgba(201,160,64,0.14); }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }

    .logo { height: 60px; margin-bottom: 8px; }
    .title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; margin-bottom: 4px; text-align: center; }
    .subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 32px; }
    .badge { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); background: rgba(201,160,64,0.1); border: 1px solid rgba(201,160,64,0.25); border-radius: 20px; padding: 5px 14px; margin-bottom: 16px; }

    .welcome-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--gold); text-align: center; margin-bottom: 4px; }

    .panel { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
    .fg { display: flex; flex-direction: column; gap: 6px; }
    .fg label { font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--muted); }
    .fg input { background: var(--s2); border: 1px solid rgba(255,255,255,0.05); border-radius: 11px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 16px; padding: 14px; outline: none; width: 100%; }
    .fg input:focus { border-color: rgba(201,160,64,0.5); }
    .fg input[readonly] { opacity: 0.5; cursor: not-allowed; }

    .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold), #E8C96A); color: #000; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,160,64,0.3); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .err { font-size: 12px; color: var(--pink); display: none; padding: 10px; background: rgba(200,68,102,0.08); border-radius: 9px; text-align: center; }

    .pw-req { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .pw-req span { color: var(--pink); }
    .pw-req span.ok { color: #34d399; }

    .success { display: none; flex-direction: column; align-items: center; gap: 16px; text-align: center; width: 100%; max-width: 400px; }
    .success-icon { font-size: 56px; }
    .success-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--gold); }
    .success-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

    .invalid { display: none; flex-direction: column; align-items: center; gap: 16px; text-align: center; width: 100%; max-width: 400px; }
    .invalid-icon { font-size: 56px; }
    .invalid-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--pink); }

    .links { display: flex; flex-direction: column; gap: 8px; align-items: center; margin-top: 8px; }
    .links a { font-size: 12px; color: var(--gold); text-decoration: none; }

    .loading { text-align: center; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <img src="logo.png" class="logo" alt="SKINS">
  <div class="badge">VIP</div>

  <!-- Loading state -->
  <div id="loading" class="loading">Laster...</div>

  <!-- Invalid/expired link -->
  <div class="invalid" id="invalid">
    <div class="invalid-icon">🚫</div>
    <div class="invalid-title">Ugyldig lenke</div>
    <div style="font-size:13px;color:var(--muted);">Denne lenken er ugyldig eller allerede brukt.</div>
    <div class="links">
      <a href="vip-login.html">Har du allerede konto? Logg inn</a>
      <a href="vip-apply.html">Søk om VIP-tilgang</a>
    </div>
  </div>

  <!-- Setup form -->
  <div class="panel" id="setup-panel" style="display:none;">
    <div class="welcome-name" id="welcome-name"></div>
    <div class="title">Opprett passord</div>
    <div class="subtitle">Velg et passord for din VIP-konto</div>

    <div class="fg"><label>Mobilnummer</label><input type="tel" id="s-phone" readonly></div>
    <div class="fg"><label>Passord</label><input type="password" id="s-pw" placeholder="Minst 6 tegn" oninput="checkPw()"></div>
    <div class="fg"><label>Bekreft passord</label><input type="password" id="s-pw2" placeholder="Gjenta passord" oninput="checkPw()"></div>
    <div class="pw-req" id="pw-req">
      <span id="req-len">Minst 6 tegn</span>
    </div>
    <div class="err" id="s-err"></div>
    <button class="btn" id="s-btn" onclick="createAccount()" disabled>Opprett konto</button>
  </div>

  <!-- Success -->
  <div class="success" id="success">
    <div class="success-icon">🎉</div>
    <div class="success-title">Konto opprettet!</div>
    <div class="success-sub">Du kan nå logge inn med mobilnummer og passord.</div>
    <a href="vip-login.html" class="btn" style="text-decoration:none;text-align:center;margin-top:8px;">Logg inn</a>
  </div>

<script>
  const SB_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
  const { createClient } = supabase;
  const sb = createClient(SB_URL, SB_KEY);

  let appData = null;

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const appId = params.get('id');

    if (!appId) { showInvalid(); return; }

    // Load the approved application
    const { data: app } = await sb.from('vip_applications')
      .select('id,full_name,phone,email,avatar_url,birth_date,status')
      .eq('id', appId)
      .single();

    if (!app || app.status !== 'approved') { showInvalid(); return; }
    if (!app.email) { showInvalid(); return; }

    // Check if profile already exists for this phone (already set up)
    const digits = (app.phone || '').replace(/[^0-9]/g, '');
    const { data: existing } = await sb.from('profiles').select('id').eq('role', 'vip').or(`phone.eq.${digits},phone.eq.${app.phone}`).maybeSingle();
    if (existing) { showInvalid(); return; }

    appData = app;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('setup-panel').style.display = 'flex';
    document.getElementById('welcome-name').textContent = 'Velkommen, ' + app.full_name + '!';
    const displayPhone = app.phone.startsWith('+') ? app.phone : '+47' + app.phone.replace(/[^0-9]/g, '');
    document.getElementById('s-phone').value = displayPhone;
  }

  function showInvalid() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('invalid').style.display = 'flex';
  }

  function checkPw() {
    const pw = document.getElementById('s-pw').value;
    const pw2 = document.getElementById('s-pw2').value;
    const lenOk = pw.length >= 6;

    document.getElementById('req-len').className = lenOk ? 'ok' : '';
    document.getElementById('s-btn').disabled = !(lenOk && pw === pw2 && pw2.length > 0);
  }

  async function createAccount() {
    const btn = document.getElementById('s-btn'), err = document.getElementById('s-err');
    const pw = document.getElementById('s-pw').value;
    const pw2 = document.getElementById('s-pw2').value;
    err.style.display = 'none';

    if (pw !== pw2) { err.textContent = 'Passordene er ikke like.'; err.style.display = 'block'; return; }
    if (pw.length < 6) { err.textContent = 'Passordet må være minst 6 tegn.'; err.style.display = 'block'; return; }

    btn.disabled = true; btn.textContent = 'Oppretter…';

    // Create auth user with email + password (email used for auth, phone shown in UI)
    let userId;
    const { data: authData, error: authErr } = await sb.auth.signUp({
      email: appData.email,
      password: pw,
      options: { data: { role: 'vip', full_name: appData.full_name } }
    });

    if (authErr) {
      // If user already exists in auth, try signing in with the new password
      if (authErr.message.includes('already registered') || authErr.message.includes('already been registered')) {
        const { data: signInData, error: signInErr } = await sb.auth.signInWithPassword({
          email: appData.email, password: pw
        });
        if (signInErr) {
          err.textContent = 'E-posten er allerede registrert med et annet passord. Bruk "Glemt passord" på innloggingssiden.';
          err.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Opprett konto';
          return;
        }
        userId = signInData.user.id;
      } else {
        err.textContent = authErr.message;
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Opprett konto';
        return;
      }
    } else {
      // signUp might not return a session if email confirmation is enabled
      if (!authData?.user?.id) {
        err.textContent = 'Kontoen ble opprettet, men krever e-postbekreftelse. Sjekk innboksen din og klikk bekreftelseslenken, deretter logg inn.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Opprett konto';
        return;
      }
      userId = authData.user.id;
    }

    // Check if profile already exists
    const { data: existingProfile } = await sb.from('profiles').select('id,role').eq('id', userId).maybeSingle();
    if (existingProfile) {
      // Profile exists — update to VIP role + merge data
      if (existingProfile.role !== 'vip') {
        await sb.from('profiles').update({
          role: 'vip',
          phone: appData.phone || undefined,
          avatar_url: appData.avatar_url || undefined,
          birth_date: appData.birth_date || undefined,
          vip_level: 1
        }).eq('id', userId);
      }
      await sb.from('vip_applications').update({ status: 'setup_complete' }).eq('id', appData.id);
      await sb.auth.signOut();
      document.getElementById('setup-panel').style.display = 'none';
      document.getElementById('success').style.display = 'flex';
      return;
    }

    // Create profile

    const { error: profErr } = await sb.from('profiles').insert({
      id: userId,
      full_name: appData.full_name,
      phone: appData.phone,
      email: appData.email,
      role: 'vip',
      avatar_url: appData.avatar_url || null,
      birth_date: appData.birth_date || null,
      vip_level: 1,
      monthly_spend: 0,
      total_points: 0,
      total_guests: 0,
      total_bookings: 0,
      credits: 0
    });

    if (profErr) {
      err.textContent = 'Profil-feil: ' + profErr.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Opprett konto';
      return;
    }

    // Mark application as setup_complete
    await sb.from('vip_applications').update({ status: 'setup_complete' }).eq('id', appData.id);

    // Sign out (user will log in manually)
    await sb.auth.signOut();

    // Show success
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('success').style.display = 'flex';
  }

  init();
</script>
</body>
</html>
