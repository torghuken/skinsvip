<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKINS VIP · Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo-wrap img { height: 110px; }

    /* ── STEP 1: CODE ── */
    #step-code {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .gold-banner { width: 100%; background: linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.05)); border: 1px solid rgba(212,175,55,0.25); border-radius: 14px; padding: 14px 20px; text-align: center; }
    .gold-banner-name { font-size: 1.2rem; font-weight: 800; color: #d4af37; }
    .gold-banner-sub { font-size: 0.7rem; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-top: 2px; }
    .gold-input { width: 100%; background: #111; border: 2px solid #2a2a2a; color: #d4af37; border-radius: 14px; padding: 18px 20px; font-size: 1.5rem; font-weight: 700; letter-spacing: 4px; text-align: center; text-transform: uppercase; outline: none; transition: border-color 0.2s; }
    .gold-input:focus { border-color: #d4af37; }
    .gold-input::placeholder { color: #333; letter-spacing: 2px; font-size: 1rem; font-weight: 400; }
    .code-amb-preview { display: none; }
    .code-input { composes: gold-input; }
    .btn-gold { width: 100%; background: linear-gradient(135deg, #d4af37, #f0c050); color: #000; font-weight: 900; border: none; border-radius: 14px; padding: 18px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(212,175,55,0.4); }
    .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .err { color: #ff6b6b; font-size: 0.85rem; text-align: center; display: none; }
    #step-guests { width: 100%; max-width: 360px; display: none; flex-direction: column; align-items: center; gap: 14px; }
    .amb-banner { width: 100%; background: linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.05)); border: 1px solid rgba(212,175,55,0.25); border-radius: 14px; padding: 16px 20px; text-align: center; }
    .amb-banner-name { font-size: 1.3rem; font-weight: 800; color: #d4af37; }
    .amb-banner-sub { font-size: 0.75rem; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-top: 2px; }
    .dark-input { width: 100%; background: #111; border: 2px solid #2a2a2a; color: #fff; border-radius: 14px; outline: none; transition: border-color 0.2s; }
    .dark-input:focus { border-color: #d4af37; }
    .dark-input::placeholder { color: #333; }
    .count-input { composes: dark-input; padding: 20px; font-size: 2rem; font-weight: 800; text-align: center; }
    .count-input::placeholder { font-size: 1rem; font-weight: 400; }
    .type-select { composes: dark-input; padding: 16px 20px; font-size: 0.95rem; cursor: pointer; }
    .type-select option { background: #111; }
    #step-success { width: 100%; max-width: 360px; display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
    .success-circle { width: 80px; height: 80px; border-radius: 50%; background: rgba(52,211,153,0.12); border: 2px solid rgba(52,211,153,0.4); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
    .success-title { font-size: 1.3rem; font-weight: 800; color: #34d399; }
    .success-detail { font-size: 0.9rem; color: #555; }
    .btn-ghost { width: 100%; background: transparent; border: 1px solid #2a2a2a; color: #888; border-radius: 14px; padding: 14px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
    .btn-ghost:hover { border-color: #d4af37; color: #d4af37; }

    .footer { margin-top: 48px; font-size: 0.65rem; color: #2a2a2a; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="logo-wrap">
  <img src="logo.png" alt="SKINS">
</div>

<!-- STEP 1: Kode -->
<div id="step-code">
  <div class="code-amb-preview" id="code-amb-preview">
    <div class="code-amb-preview-name" id="code-amb-preview-name"></div>
    <div class="code-amb-preview-sub">SKINS Ambassador</div>
  </div>
  <input
    class="code-input"
    type="text"
    id="code-input"
    placeholder="Tast kode"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    maxlength="20"
  />
  <div class="err" id="code-err">Ugyldig kode. Prøv igjen.</div>
  <button class="btn-gold" id="code-btn" onclick="validateCode()">Bekreft &#8594;</button>
</div>

<!-- STEP 2: Antall gjester -->
<div id="step-guests">
  <div class="amb-banner">
    <div class="amb-banner-name" id="amb-name">–</div>
    <div class="amb-banner-sub">SKINS Ambassador</div>
  </div>

  <input
    class="count-input"
    type="number"
    id="guest-count"
    placeholder="Antall gjester"
    min="1"
    max="999"
    inputmode="numeric"
  />

  <select class="type-select" id="guest-type">
    <option value="regular">Vanlig inngang</option>
    <option value="table">Bordbooking</option>
    <option value="vip_event">VIP-arrangement</option>
    <option value="birthday">Bursdag</option>
  </select>

  <div class="err" id="guest-err">Angi antall gjester.</div>
  <button class="btn-gold" id="guest-btn" onclick="submitGuests()">Registrer gjester &#10003;</button>
</div>

<!-- SUCCESS -->
<div id="step-success">
  <div class="success-circle">&#10003;</div>
  <div class="success-title" id="success-title">Registrert!</div>
  <div class="success-detail" id="success-detail"></div>
  <button class="btn-ghost" onclick="resetToGuests()">+ Registrer flere</button>
  <button class="btn-ghost" onclick="resetToCode()" style="color:#333;border-color:#1a1a1a;">Bytt ambassadør</button>
</div>

<div class="footer">© 2026 SKINS NightClub · skinsvip.no</div>

<script>
  const SB_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
  const { createClient } = supabase;
  const sb = createClient(SB_URL, SB_KEY);

  let ambProfile = null;
  let ambId = null;

  const hideEl = (id) => document.getElementById(id).style.display = 'none';
  const showEl = (id, type = 'block') => document.getElementById(id).style.display = type;

  window.addEventListener('DOMContentLoaded', () => {
    const ambRef = new URLSearchParams(window.location.search).get('amb');
    if (ambRef) {
      document.getElementById('code-input').value = ambRef.toUpperCase();
      previewAmbFromUrl(ambRef.toUpperCase());
    } else {
      document.getElementById('code-input').focus();
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('code-input').addEventListener('keydown', e => { if (e.key === 'Enter') validateCode(); });
    document.getElementById('guest-count').addEventListener('keydown', e => { if (e.key === 'Enter') submitGuests(); });
  });

  async function previewAmbFromUrl(code) {
    let query = sb.from('profiles').select('id, full_name, ambassador_code');
    query = code.startsWith('SKINS-') || code.length < 36
      ? query.eq('ambassador_code', code)
      : query.eq('id', code);
    const { data } = await query.single();
    if (data) {
      document.getElementById('code-amb-preview-name').textContent = data.full_name || 'Ambassador';
      showEl('code-amb-preview');
    }
  }

  async function validateCode() {
    const btn = document.getElementById('code-btn');
    const errEl = document.getElementById('code-err');
    const raw = document.getElementById('code-input').value.trim().toUpperCase();

    if (!raw) { showEl('code-err'); return; }

    btn.disabled = true;
    btn.textContent = '…';
    hideEl('code-err');

    let query = sb.from('profiles').select('id, full_name, ambassador_code, total_points, total_guests');
    query = raw.startsWith('SKINS-') || raw.length < 36
      ? query.eq('ambassador_code', raw)
      : query.eq('id', raw);

    const { data, error } = await query.single();
    btn.disabled = false;
    btn.textContent = 'Bekreft \u2192';

    if (error || !data) {
      showEl('code-err');
      document.getElementById('code-input').focus();
      return;
    }

    ambProfile = data;
    ambId = data.id;
    document.getElementById('amb-name').textContent = data.full_name || 'Ambassador';
    hideEl('step-code');
    showEl('step-guests', 'flex');
    document.getElementById('guest-count').focus();
  }

  async function submitGuests() {
    const btn = document.getElementById('guest-btn');
    const errEl = document.getElementById('guest-err');
    const count = parseInt(document.getElementById('guest-count').value);
    const type  = document.getElementById('guest-type').value;

    if (!count || count < 1) { showEl('guest-err'); return; }
    hideEl('guest-err');

    btn.disabled = true;
    btn.textContent = 'Lagrer…';

    const mult = getTimeMultiplier();
    const points = count * 10 * mult;

    const { error } = await sb.from('guest_registrations').insert({
      ambassador_id: ambId, event_type: type, guest_count: count,
      time_multiplier: mult, total_points: points,
      registered_at: new Date().toISOString()
    });

    if (error) {
      errEl.textContent = 'Feil: ' + error.message;
      showEl('guest-err');
      btn.disabled = false;
      btn.textContent = 'Registrer gjester \u2713';
      return;
    }

    await updateAmbassadorStats(points, count);
    btn.disabled = false;
    btn.textContent = 'Registrer gjester ✓';

    hideEl('step-guests');
    showEl('step-success', 'flex');
    document.getElementById('success-title').textContent = count === 1 ? '1 gjest registrert!' : count + ' gjester registrert!';
    document.getElementById('success-detail').textContent = '+' + points + ' poeng til ' + (ambProfile.full_name || 'Ambassador') + ' · ×' + mult + ' multiplikator';
  }

  async function updateAmbassadorStats(addPoints, addGuests) {
    const { data: fresh } = await sb.from('profiles')
      .select('total_points, total_guests')
      .eq('id', ambId).single();
    const newPts = (fresh?.total_points || 0) + addPoints;
    const newGuests = (fresh?.total_guests || 0) + addGuests;
    await sb.from('profiles').update({
      total_points: newPts, total_guests: newGuests
    }).eq('id', ambId);
    ambProfile.total_points = newPts;
    ambProfile.total_guests = newGuests;
  }

  function resetToGuests() {
    document.getElementById('guest-count').value = '';
    hideEl('step-success');
    showEl('step-guests', 'flex');
    document.getElementById('guest-count').focus();
  }

  function resetToCode() {
    ambProfile = null;
    ambId = null;
    document.getElementById('code-input').value = '';
    document.getElementById('guest-count').value = '';
    hideEl('step-success');
    hideEl('step-guests');
    showEl('step-code', 'flex');
    document.getElementById('code-input').focus();
    history.replaceState(null, '', window.location.pathname);
  }

  function getTimeMultiplier() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const t = h * 60 + m;
    if (t < 1395) return 3;
    if (t < 1425) return 2;
    if (t < 1440) return 1.5;
    return 1;
  }
</script>
</body>
</html>
