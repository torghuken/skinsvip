<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKINS VIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #070707; color: #EDE8E0;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }

    /* Watermark logo */
    .watermark {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw; max-width: 500px; opacity: 0.03;
      pointer-events: none; z-index: 0;
    }

    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 40px; padding: 40px 24px;
    }

    .logo { width: 70vw; max-width: 400px; margin-bottom: 8px; }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: 6px; text-transform: uppercase; color: #66665e; }

    .buttons { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 300px; }

    .btn-vip {
      display: flex; align-items: center; justify-content: center;
      padding: 20px 24px; border-radius: 16px;
      font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; text-decoration: none;
      transition: all 0.3s ease; cursor: pointer; border: none;
    }

    .btn-vip-gold {
      background: linear-gradient(135deg, #C9A040, #E8C96A);
      color: #000; box-shadow: 0 8px 32px rgba(201,160,64,0.25);
    }
    .btn-vip-gold:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(201,160,64,0.35); }

    .btn-vip-dark {
      background: #0f0f0f; color: #C9A040;
      border: 1px solid rgba(201,160,64,0.25);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-vip-dark:hover { border-color: rgba(201,160,64,0.5); transform: translateY(-2px); }

    .tagline {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: #66665e; text-align: center;
      letter-spacing: 0.3px; opacity: 0.7; margin-top: 20px;
    }

    .admin-link {
      position: fixed; bottom: 16px; right: 16px;
      font-size: 10px; color: #222; text-decoration: none; z-index: 2;
    }
  </style>
</head>
<body>
  <img src="logo.png" class="watermark" alt="">

  <div class="content">
    <div style="text-align:center;display:flex;justify-content:center;">
      <img src="logo.png" class="logo" alt="SKINS">
    </div>

    <div class="buttons">
      <a href="vip-login.html" class="btn-vip btn-vip-gold">VIP</a>
      <a href="amb-login.html" class="btn-vip btn-vip-dark">Ambassador</a>
    </div>

    <p class="tagline">The night belongs to those who show up</p>
  </div>

  <a href="super-admin.html" class="admin-link">admin</a>
</body>
</html>
