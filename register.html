<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKINS VIP – Registrer Gjester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #070707; --s1: #0f0f0f; --s2: #161616; --s3: #1c1c1c;
      --gold: #C9A040; --gold-dim: rgba(201,160,64,0.1); --gold-glow: rgba(201,160,64,0.22);
      --pink: #C84466; --pink-dim: rgba(200,68,102,0.1);
      --green: #3CB07A; --green-dim: rgba(60,176,122,0.1);
      --text: #EDE8E0; --muted: #66665e; --sub: #999890;
      --border: rgba(201,160,64,0.13); --border-s: rgba(255,255,255,0.05);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(201,160,64,0.06) 0%, transparent 70%); top: -100px; right: -100px; animation: o1 16s ease-in-out infinite alternate; }
    .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(200,68,102,0.05) 0%, transparent 70%); bottom: -80px; left: -80px; animation: o2 20s ease-in-out infinite alternate; }
    @keyframes o1 { from { transform: translate(0,0); } to { transform: translate(-30px,40px); } }
    @keyframes o2 { from { transform: translate(0,0); } to { transform: translate(40px,-30px); } }

    /* NAV */
    .nav { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 58px; background: rgba(7,7,7,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-logo { height: 30px; }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 15px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
    .nav-badge { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; background: var(--s2); border: 1px solid var(--border-s); padding: 4px 10px; border-radius: 20px; }

    /* STEP INDICATOR */
    .steps {
      display: flex; align-items: center; justify-content: center;
      padding: 20px 24px 8px; gap: 0; position: relative; z-index: 1;
    }
    .step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; transition: all 0.3s;
      border: 1.5px solid var(--border-s); background: var(--s1); color: var(--muted);
    }
    .step-dot.active { background: var(--gold); border-color: var(--gold); color: #000; box-shadow: 0 4px 16px rgba(201,160,64,0.3); }
    .step-dot.done { background: rgba(201,160,64,0.15); border-color: var(--gold); color: var(--gold); }
    .step-line { flex: 1; height: 1px; background: var(--border-s); max-width: 60px; transition: background 0.3s; }
    .step-line.done { background: var(--gold); opacity: 0.4; }

    /* MAIN */
    .main { position: relative; z-index: 1; padding: 24px 20px 40px; max-width: 480px; margin: 0 auto; }

    /* STEP PANELS */
    .step-panel { display: none; flex-direction: column; gap: 0; }
    .step-panel.active { display: flex; animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .panel-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; margin-bottom: 4px; }
    .panel-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 28px; }

    /* CODE INPUT */
    .code-input-wrap { position: relative; margin-bottom: 16px; }
    .code-input { width: 100%; background: var(--s1); border: 1.5px solid var(--border-s); border-radius: 16px; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; letter-spacing: 8px; text-align: center; padding: 20px 16px; outline: none; text-transform: uppercase; transition: border-color 0.25s, box-shadow 0.25s; caret-color: var(--gold); }
    .code-input:focus { border-color: rgba(201,160,64,0.5); box-shadow: 0 0 0 3px rgba(201,160,64,0.07); }
    .code-input.valid { border-color: var(--green); box-shadow: 0 0 0 3px rgba(60,176,122,0.07); }
    .code-input.invalid { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(200,68,102,0.07); }

    .ambassador-found { display: none; flex-direction: column; align-items: center; gap: 6px; background: var(--green-dim); border: 1px solid rgba(60,176,122,0.2); border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; text-align: center; }
    .ambassador-found.show { display: flex; }
    .ambassador-found .af-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--green); }
    .ambassador-found .af-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

    /* STEP 2 -- FORM */
    .form-section { margin-bottom: 20px; }
    .form-section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: block; }
    .guest-counter { display: flex; align-items: center; justify-content: center; gap: 24px; background: var(--s1); border: 1px solid var(--border-s); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
    .counter-btn { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--s2); color: var(--gold); font-size: 22px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: 'Outfit', sans-serif; }
    .counter-btn:active { transform: scale(0.93); background: var(--gold-dim); }
    .counter-val { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 700; color: var(--text); min-width: 72px; text-align: center; line-height: 1; }
    .counter-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-align: center; }

    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .type-btn { padding: 16px 12px; border-radius: 14px; border: 1.5px solid var(--border-s); background: var(--s1); color: var(--muted); cursor: pointer; text-align: center; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .type-btn .type-icon { font-size: 22px; display: block; margin-bottom: 6px; }
    .type-btn .type-name { font-size: 12px; font-weight: 500; letter-spacing: 0.5px; display: block; }
    .type-btn.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--text); }

    .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .time-btn { padding: 12px 8px; border-radius: 12px; border: 1.5px solid var(--border-s); background: var(--s1); color: var(--muted); cursor: pointer; text-align: center; font-size: 11px; font-weight: 500; letter-spacing: 0.5px; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .time-btn.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

    /* POINTS PREVIEW */
    .pts-preview { background: var(--s1); border: 1px solid var(--border); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .pts-preview-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .pts-preview-val { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--gold); }
    .pts-breakdown { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* STEP 3 -- SUCCESS */
    .success-wrap { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0; padding: 8px 0; }
    .success-circle { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--pink)); display: flex; align-items: center; justify-content: center; font-size: 44px; margin-bottom: 24px; box-shadow: 0 0 60px rgba(201,160,64,0.25); animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes pop { from { transform: scale(0.5); opacity:0; } to { transform: scale(1); opacity:1; } }
    .pts-float { position: fixed; left: 50%; top: 40%; transform: translateX(-50%); font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 700; color: var(--gold); text-shadow: 0 0 30px rgba(201,160,64,0.5); pointer-events: none; z-index: 999; animation: floatUp 1.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    @keyframes floatUp { 0% { opacity: 0; transform: translateX(-50%) translateY(30px) scale(0.7); } 15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); } 30% { transform: translateX(-50%) translateY(-10px) scale(1); } 100% { opacity: 0; transform: translateX(-50%) translateY(-120px) scale(0.9); } }
    .success-title { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 600; margin-bottom: 6px; }
    .success-sub { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 36px; }
    .success-stats { display: flex; gap: 1px; width: 100%; margin-bottom: 36px; }
    .sstat { flex: 1; background: var(--s1); border: 1px solid var(--border-s); padding: 16px 12px; text-align: center; }
    .sstat:first-child { border-radius: 14px 0 0 14px; }
    .sstat:last-child { border-radius: 0 14px 14px 0; }
    .sstat-val { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--gold); }
    .sstat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

    /* BUTTONS */
    .btn { width: 100%; padding: 17px; background: var(--gold); color: #000; border: none; border-radius: 14px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .btn:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(201,160,64,0.28); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { width: 100%; padding: 17px; background: transparent; color: var(--text); border: 1px solid var(--border-s); border-radius: 14px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
    .btn-outline:hover { border-color: var(--border); background: var(--s1); }

    /* ERROR */
    .err-msg { font-size: 12px; color: var(--pink); display: none; padding: 10px 14px; background: var(--pink-dim); border-radius: 10px; border: 1px solid rgba(200,68,102,0.2); margin-bottom: 16px; text-align: center; }
    .err-msg.show { display: block; }

    /* RECENT */
    .recent-section { margin-top: 32px; }
    .recent-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .recent-list { display: flex; flex-direction: column; gap: 8px; }
    .recent-row { display: flex; align-items: center; justify-content: space-between; background: var(--s1); border: 1px solid var(--border-s); border-radius: 12px; padding: 12px 14px; }
    .recent-name { font-size: 13px; font-weight: 500; }
    .recent-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .recent-pts { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--gold); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav class="nav">
    <img src="logo.png" alt="SKINS" class="nav-logo">
    <div class="nav-title">Inngang</div>
    <div class="nav-badge" id="staff-badge">Staff</div>
  </nav>

  <!-- STEP INDICATOR -->
  <div class="steps">
    <div class="step-dot active" id="step-dot-1">1</div>
    <div class="step-line" id="step-line-1"></div>
    <div class="step-dot" id="step-dot-2">2</div>
    <div class="step-line" id="step-line-2"></div>
    <div class="step-dot" id="step-dot-3">3</div>
  </div>

  <div class="main">
    <!-- STEP 1: Ambassador code -->
    <div class="step-panel active" id="panel-1">
      <div class="panel-title">Ambassadørkode</div>
      <div class="panel-sub">Scan QR eller skriv inn koden manuelt</div>

      <div class="code-input-wrap">
        <input type="text" class="code-input" id="code-input" placeholder="••••••" maxlength="8" autocomplete="off" autocapitalize="characters" spellcheck="false">
      </div>

      <div class="ambassador-found" id="amb-found">
        <div class="af-label">Ambassadør funnet</div>
        <div class="af-name" id="amb-name">—</div>
      </div>

      <div class="err-msg" id="err-1"></div>
      <button class="btn" id="btn-1" onclick="goToStep2()" disabled>Neste</button>
    </div>

    <!-- STEP 2: Guest count + type -->
    <div class="step-panel" id="panel-2">
      <div class="panel-title">Registrer gjester</div>
      <div class="panel-sub" id="step2-amb-name">For —</div>

      <div class="form-section">
        <label class="form-section-label">Antall gjester</label>
        <div class="guest-counter">
          <button class="counter-btn" onclick="adjustGuests(-1)">−</button>
          <div>
            <div class="counter-val" id="guest-count">1</div>
            <div class="counter-label">gjester</div>
          </div>
          <button class="counter-btn" onclick="adjustGuests(1)">+</button>
        </div>
      </div>

      <div class="form-section">
        <label class="form-section-label">Arrangementstype</label>
        <div class="type-grid">
          <button class="type-btn selected" onclick="selectType('normal', this)">
            <span class="type-icon">🚪</span>
            <span class="type-name">Normal inngang</span>
          </button>
          <button class="type-btn" onclick="selectType('birthday', this)">
            <span class="type-icon">🎂</span>
            <span class="type-name">Bursdag</span>
          </button>
          <button class="type-btn" onclick="selectType('corporate', this)">
            <span class="type-icon">💼</span>
            <span class="type-name">Corporate</span>
          </button>
          <button class="type-btn" onclick="selectType('vip', this)">
            <span class="type-icon">⭐</span>
            <span class="type-name">VIP Event</span>
          </button>
          <button class="type-btn" onclick="selectType('table', this)">
            <span class="type-icon">🍾</span>
            <span class="type-name">Bordbooking</span>
          </button>
        </div>
      </div>

      <div class="form-section">
        <label class="form-section-label">Tidspunkt</label>
        <div class="time-grid">
          <button class="time-btn selected" id="time-before" onclick="selectTime('before_2300', this)">Før 23:00</button>
          <button class="time-btn" id="time-22" onclick="selectTime('2300_2330', this)">23:00–23:30</button>
          <button class="time-btn" id="time-23" onclick="selectTime('2330_0000', this)">23:30–00</button>
          <button class="time-btn" id="time-after" onclick="selectTime('after_0000', this)">Etter 00</button>
        </div>
      </div>

      <div class="pts-preview" id="pts-preview">
        <div>
          <div class="pts-preview-label">Estimerte poeng</div>
          <div class="pts-breakdown" id="pts-breakdown">—</div>
        </div>
        <div class="pts-preview-val" id="pts-val">—</div>
      </div>

      <div class="err-msg" id="err-2"></div>
      <button class="btn" id="btn-2" onclick="submitRegistration()">Registrer</button>
      <button class="btn-outline" onclick="goToStep(1)">Tilbake</button>
    </div>

    <!-- STEP 3: Success -->
    <div class="step-panel" id="panel-3">
      <div class="success-wrap">
        <div class="success-circle">✓</div>
        <div class="success-title">Registrert!</div>
        <div class="success-sub" id="success-desc">Gjestene er registrert</div>

        <div class="success-stats">
          <div class="sstat">
            <div class="sstat-val" id="s-guests">0</div>
            <div class="sstat-lbl">Gjester</div>
          </div>
          <div class="sstat">
            <div class="sstat-val" id="s-pts">0</div>
            <div class="sstat-lbl">Poeng</div>
          </div>
          <div class="sstat">
            <div class="sstat-val" id="s-credits">0</div>
            <div class="sstat-lbl">Credits</div>
          </div>
        </div>

        <button class="btn" onclick="resetForm()">Ny registrering</button>
      </div>

      <div class="recent-section" id="recent-section">
        <div class="recent-title">Dagens registreringer</div>
        <div class="recent-list" id="recent-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // State
    let currentStep = 1;
    let foundAmbassador = null;
    let guestCount = 1;
    let selectedType = 'normal';
    let submitting = false;
    let selectedTime = 'before_2300';
    let pointSettings = {};
    let codeTimer = null;

    // Load point settings
    async function loadSettings() {
      const { data } = await sb.from('point_settings').select('key,value');
      if (data) data.forEach(r => { pointSettings[r.key] = parseFloat(r.value); });
    }
    loadSettings();

    // Step navigation
    function goToStep(n) {
      document.getElementById('panel-' + currentStep).classList.remove('active');
      currentStep = n;
      document.getElementById('panel-' + n).classList.add('active');
      updateStepDots();
    }

    function updateStepDots() {
      for (let i = 1; i <= 3; i++) {
        const dot = document.getElementById('step-dot-' + i);
        dot.classList.remove('active','done');
        if (i < currentStep) dot.classList.add('done'), dot.textContent = '✓';
        else if (i === currentStep) dot.classList.add('active'), dot.textContent = i;
        else dot.textContent = i;
        if (i < 3) {
          const line = document.getElementById('step-line-' + i);
          line.classList.toggle('done', i < currentStep);
        }
      }
    }

    // Code input
    const codeInput = document.getElementById('code-input');
    codeInput.addEventListener('input', () => {
      const val = codeInput.value.toUpperCase();
      codeInput.value = val;
      codeInput.classList.remove('valid','invalid');
      document.getElementById('amb-found').classList.remove('show');
      document.getElementById('btn-1').disabled = true;
      document.getElementById('err-1').classList.remove('show');
      foundAmbassador = null;
      if (val.length >= 3) {
        clearTimeout(codeTimer);
        codeTimer = setTimeout(() => lookupCode(val), 500);
      }
    });

    async function lookupCode(code) {
      const { data } = await sb.from('profiles')
        .select('id,full_name,total_points,total_guests,credits')
        .eq('ambassador_code', code)
        .eq('role','ambassador')
        .single();
      if (data) {
        foundAmbassador = data;
        codeInput.classList.add('valid');
        document.getElementById('amb-name').textContent = data.full_name || '—';
        document.getElementById('amb-found').classList.add('show');
        document.getElementById('btn-1').disabled = false;
      } else {
        codeInput.classList.add('invalid');
        const err = document.getElementById('err-1');
        err.textContent = 'Ukjent ambassadørkode';
        err.classList.add('show');
      }
    }

    async function goToStep2() {
      if (!foundAmbassador) return;
      document.getElementById('step2-amb-name').textContent = 'For ' + (foundAmbassador.full_name || '—');
      updatePtsPreview();
      goToStep(2);
    }

    // Guest counter
    function adjustGuests(delta) {
      guestCount = Math.max(1, Math.min(200, guestCount + delta));
      document.getElementById('guest-count').textContent = guestCount;
      updatePtsPreview();
    }

    // Type selection
    function selectType(type, el) {
      selectedType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      updatePtsPreview();
    }

    // Time selection
    function selectTime(time, el) {
      selectedTime = time;
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      updatePtsPreview();
    }

    // Points calculation — flat 10 pts per guest + time multiplier
    function calcPoints() {
      if (!Object.keys(pointSettings).length) return 0;
      const s = pointSettings;
      const ptsPerGuest = s.pts_per_guest || 10;
      const base = guestCount * ptsPerGuest;
      // Time multiplier
      let mult = 1;
      if (selectedTime === 'before_2300') mult = s.mult_before_2300 || 3;
      else if (selectedTime === '2300_2330') mult = s.mult_2300_2330 || 2;
      else if (selectedTime === '2330_0000') mult = s.mult_2330_0000 || 1.5;
      else mult = s.mult_after_0000 || 1;
      return Math.round(base * mult);
    }

    function updatePtsPreview() {
      const pts = calcPoints();
      const credits = Math.min(Math.floor(pts / (pointSettings.credits_per_points || 100)), pointSettings.credits_max_night || 25);
      document.getElementById('pts-val').textContent = pts.toLocaleString('no') + ' pts';
      const typeLabels = { normal:'Inngang', birthday:'Bursdag', corporate:'Corporate', table:'Bord', vip:'VIP' };
      const timeLabels = { before_2300:'×3 før 23', '2300_2330':'×2 23-23:30', '2330_0000':'×1.5 23:30-00', after_0000:'×1 etter 00' };
      let breakdown = `${guestCount} gjester · ${timeLabels[selectedTime]}`;
      if (selectedType !== 'normal') breakdown += ` · ${typeLabels[selectedType]}`;
      if (credits > 0) breakdown += ` · +${credits} credits`;
      document.getElementById('pts-breakdown').textContent = breakdown;
    }

    // Submit
    async function submitRegistration() {
      if (!foundAmbassador || submitting) return;
      submitting = true;
      const btn = document.getElementById('btn-2');
      btn.disabled = true; btn.textContent = 'Registrerer…';
      document.getElementById('err-2').classList.remove('show');

      try {
        const res = await fetch('/api/register-guests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ambassador_id: foundAmbassador.id,
            ambassador_name: foundAmbassador.full_name || null,
            guest_count: guestCount,
            event_type: selectedType || 'regular'
          })
        });
        const data = await res.json();

        if (!res.ok || data.error) {
          const err = document.getElementById('err-2');
          err.textContent = 'Kunne ikke registrere: ' + (data.error || 'Ukjent feil');
          err.classList.add('show');
          btn.disabled = false; btn.textContent = 'Registrer';
          return;
        }

        // Update local state
        foundAmbassador.total_points = data.newPts;
        foundAmbassador.total_guests = data.newGuests;

        // Show success
        document.getElementById('s-guests').textContent = guestCount;
        document.getElementById('s-pts').textContent = data.pts.toLocaleString('no');
        document.getElementById('s-credits').textContent = data.credits;
        document.getElementById('success-desc').textContent =
          (foundAmbassador.full_name || 'Ambassadøren') + ' har fått ' + data.pts.toLocaleString('no') + ' poeng';

        loadRecentRegistrations();
        goToStep(3);
        showPtsFloat('+' + data.pts.toLocaleString('no') + ' pts');
      } catch (e) {
        const err = document.getElementById('err-2');
        err.textContent = 'Nettverksfeil: ' + e.message;
        err.classList.add('show');
      }
      btn.disabled = false; btn.textContent = 'Registrer';
      submitting = false;
    }

    async function loadRecentRegistrations() {
      const today = new Date();
      today.setHours(0,0,0,0);
      const { data } = await sb.from('guest_registrations')
        .select('guest_count, event_type, points_earned, registered_at, profiles:ambassador_id(full_name)')
        .gte('registered_at', today.toISOString())
        .order('registered_at', { ascending: false })
        .limit(8);
      if (!data || !data.length) {
        document.getElementById('recent-section').style.display = 'none';
        return;
      }
      document.getElementById('recent-section').style.display = '';
      const typeEmoji = { normal:'🚪', birthday:'🎂', corporate:'💼', vip:'⭐', table:'🍾' };
      document.getElementById('recent-list').innerHTML = data.map(r => {
        const name = r.profiles?.full_name || '—';
        const time = new Date(r.registered_at).toLocaleTimeString('no', { hour:'2-digit', minute:'2-digit' });
        return `<div class="recent-row">
          <div>
            <div class="recent-name">${typeEmoji[r.event_type]||'🚪'} ${name}</div>
            <div class="recent-meta">${r.guest_count} gjester · ${time}</div>
          </div>
          <div class="recent-pts">+${(r.points_earned||0).toLocaleString('no')}</div>
        </div>`;
      }).join('');
    }

    function showPtsFloat(text) {
      const el = document.createElement('div');
      el.className = 'pts-float';
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    function resetForm() {
      foundAmbassador = null;
      guestCount = 1;
      selectedType = 'normal';
      selectedTime = 'before_2300';
      codeInput.value = '';
      codeInput.classList.remove('valid','invalid');
      document.getElementById('amb-found').classList.remove('show');
      document.getElementById('btn-1').disabled = true;
      document.getElementById('guest-count').textContent = '1';
      document.querySelectorAll('.type-btn').forEach((b,i) => { b.classList.toggle('selected', i===0); });
      document.querySelectorAll('.time-btn').forEach((b,i) => { b.classList.toggle('selected', i===0); });
      goToStep(1);
    }
  </script>
</body>
</html>
