<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKINS VIP · Bartender</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo-wrap img { height: 110px; }

    /* ── STEP 1: CODE ── */
    #step-code {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .gold-banner { width: 100%; background: linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.05)); border: 1px solid rgba(212,175,55,0.25); border-radius: 14px; padding: 14px 20px; text-align: center; }
    .gold-banner-name { font-size: 1.2rem; font-weight: 800; color: #d4af37; }
    .gold-banner-sub { font-size: 0.7rem; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-top: 2px; }
    .gold-input { width: 100%; background: #111; border: 2px solid #2a2a2a; color: #d4af37; border-radius: 14px; padding: 18px 20px; font-size: 1.5rem; font-weight: 700; letter-spacing: 4px; text-align: center; text-transform: uppercase; outline: none; transition: border-color 0.2s; }
    .gold-input:focus { border-color: #d4af37; }
    .gold-input::placeholder { color: #333; letter-spacing: 2px; font-size: 1rem; font-weight: 400; }
    .code-amb-preview { display: none; }
    .code-amb-preview.show { display: block; }
    .code-input { composes: gold-input; }
    .code-input.preview { display: none; }
    .code-input.preview.show { display: block; }

    .btn-gold { width: 100%; background: linear-gradient(135deg, #d4af37, #f0c050); color: #000; font-weight: 900; border: none; border-radius: 14px; padding: 18px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(212,175,55,0.4); }
    .btn-gold:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .err { color: #ff6b6b; font-size: 0.85rem; text-align: center; display: none; }

    /* ── STEP 2: GUESTS ── */
    #step-guests {
      width: 100%;
      max-width: 360px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .amb-banner { width: 100%; background: linear-gradient(135deg, rgba(212,175,55,0.12), rgba(212,175,55,0.05)); border: 1px solid rgba(212,175,55,0.25); border-radius: 14px; padding: 16px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .amb-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #d4af37, #f0c050); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: #000; overflow: hidden; box-shadow: 0 4px 16px rgba(212,175,55,0.25); }
    .amb-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .amb-banner-name { font-size: 1.3rem; font-weight: 800; color: #d4af37; }
    .amb-banner-sub { font-size: 0.75rem; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-top: 2px; }

    .dark-input { width: 100%; background: #111; border: 2px solid #2a2a2a; color: #fff; border-radius: 14px; outline: none; transition: border-color 0.2s; }
    .dark-input:focus { border-color: #d4af37; }
    .dark-input::placeholder { color: #333; }
    .count-input { composes: dark-input; padding: 20px; font-size: 2rem; font-weight: 800; text-align: center; }
    .count-input::placeholder { font-size: 1rem; font-weight: 400; }
    .type-select { composes: dark-input; padding: 16px 20px; font-size: 0.95rem; cursor: pointer; }
    .type-select option { background: #111; }

    /* ── SUCCESS ── */
    #step-success {
      width: 100%;
      max-width: 360px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .success-circle { width: 80px; height: 80px; border-radius: 50%; background: rgba(52,211,153,0.12); border: 2px solid rgba(52,211,153,0.4); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
    .success-title { font-size: 1.3rem; font-weight: 800; color: #34d399; }
    .success-detail { font-size: 0.9rem; color: #555; }
    .btn-ghost { width: 100%; background: transparent; border: 1px solid #2a2a2a; color: #888; border-radius: 14px; padding: 14px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
    .btn-ghost:hover { border-color: #d4af37; color: #d4af37; }
    .pts-float { position: fixed; left: 50%; top: 35%; transform: translateX(-50%); font-size: 48px; font-weight: 800; color: #d4af37; text-shadow: 0 0 30px rgba(212,175,55,0.5); pointer-events: none; z-index: 999; animation: floatUp 1.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    @keyframes floatUp { 0% { opacity: 0; transform: translateX(-50%) translateY(30px) scale(0.7); } 15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); } 30% { transform: translateX(-50%) translateY(-10px) scale(1); } 100% { opacity: 0; transform: translateX(-50%) translateY(-120px) scale(0.9); } }

    /* ── MODE TOGGLE ── */
    .mode-toggle { display: flex; width: 100%; background: #111; border-radius: 14px; border: 1px solid #2a2a2a; overflow: hidden; margin-bottom: 14px; }
    .mode-btn { flex: 1; padding: 14px 8px; background: transparent; border: none; color: #555; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
    .mode-btn.active { background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05)); color: #d4af37; }

    /* ── STEP 2b: BAR REVENUE ── */
    #step-bar {
      width: 100%; max-width: 360px;
      display: none; flex-direction: column;
      align-items: center; gap: 14px;
    }
    .amount-input { width: 100%; background: #111; border: 2px solid #2a2a2a; color: #d4af37; border-radius: 14px; padding: 20px; font-size: 2rem; font-weight: 800; text-align: center; outline: none; transition: border-color 0.2s; }
    .amount-input:focus { border-color: #d4af37; }
    .amount-input::placeholder { color: #333; font-size: 1rem; font-weight: 400; }
    .bar-preview { width: 100%; background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.15); border-radius: 14px; padding: 14px 20px; text-align: center; }
    .bar-preview-label { font-size: 0.7rem; letter-spacing: 2px; color: #555; text-transform: uppercase; }
    .bar-preview-val { font-size: 1.3rem; font-weight: 800; color: #d4af37; margin-top: 4px; }

    /* ── STEP 0: PIN ── */
    #step-pin {
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .pin-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .pin-sub { font-size: 0.75rem; color: #555; letter-spacing: 1px; margin-bottom: 8px; }
    .pin-input { width: 100%; background: #111; border: 2px solid #2a2a2a; color: #d4af37; border-radius: 14px; padding: 20px; font-size: 2rem; font-weight: 900; letter-spacing: 12px; text-align: center; outline: none; transition: border-color 0.2s; }
    .pin-input:focus { border-color: #d4af37; }
    .pin-input::placeholder { color: #333; font-size: 1rem; letter-spacing: 2px; font-weight: 400; }
    .pin-role-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; margin-top: 4px; }

    .footer { margin-top: 48px; font-size: 0.65rem; color: #2a2a2a; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="logo-wrap">
  <img src="logo.png" alt="SKINS">
</div>

<!-- STEP 0: PIN -->
<div id="step-pin">
  <div class="pin-title">Personalkode</div>
  <div class="pin-sub">Tast din 4-sifrede kode</div>
  <input
    class="pin-input"
    type="tel"
    id="pin-input"
    placeholder="• • • •"
    maxlength="4"
    inputmode="numeric"
    autocomplete="off"
  />
  <div class="err" id="pin-err">Ugyldig kode. Prøv igjen.</div>
</div>

<!-- STEP 1: Kode -->
<div id="step-code" style="display:none;">
  <div class="code-amb-preview" id="code-amb-preview">
    <div class="code-amb-preview-name" id="code-amb-preview-name"></div>
    <div class="code-amb-preview-sub">SKINS Ambassador</div>
  </div>
  <input
    class="code-input"
    type="text"
    id="code-input"
    placeholder="Tast kode"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    maxlength="20"
  />
  <div class="err" id="code-err">Ugyldig kode. Prøv igjen.</div>
  <button class="btn-gold" id="code-btn" onclick="validateCode()">Bekreft &#8594;</button>
</div>

<!-- STEP 2: Antall gjester -->
<div id="step-guests">
  <div class="amb-banner">
    <div class="amb-avatar" id="amb-avatar">?</div>
    <div class="amb-banner-name" id="amb-name">–</div>
    <div class="amb-banner-sub">SKINS Ambassador</div>
  </div>

  <div class="mode-toggle" id="mode-toggle-guests">
    <button class="mode-btn active" onclick="switchMode('guests')">🎉 Gjester</button>
    <button class="mode-btn" onclick="switchMode('bar')">🍾 Baromsetning</button>
  </div>

  <input
    class="count-input"
    type="number"
    id="guest-count"
    placeholder="Antall gjester"
    min="1"
    max="999"
    inputmode="numeric"
  />

  <input type="hidden" id="guest-type" value="regular" />

  <div class="err" id="guest-err">Angi antall gjester.</div>
  <button class="btn-gold" id="guest-btn" onclick="submitGuests()">Registrer gjester &#10003;</button>
</div>

<!-- STEP 2b: Baromsetning -->
<div id="step-bar">
  <div class="amb-banner">
    <div class="amb-avatar" id="amb-avatar-bar">?</div>
    <div class="amb-banner-name" id="amb-name-bar">–</div>
    <div class="amb-banner-sub">SKINS Ambassador</div>
  </div>

  <div class="mode-toggle" id="mode-toggle-bar">
    <button class="mode-btn" onclick="switchMode('guests')">🎉 Gjester</button>
    <button class="mode-btn active" onclick="switchMode('bar')">🍾 Baromsetning</button>
  </div>

  <input
    class="amount-input"
    type="number"
    id="bar-amount"
    placeholder="Beløp i kr"
    min="1"
    inputmode="numeric"
  />

  <div class="bar-preview">
    <div class="bar-preview-label">Poeng &amp; Credits</div>
    <div class="bar-preview-val" id="bar-preview-val">0 poeng · 0 credits</div>
  </div>

  <div class="err" id="bar-err">Angi beløp.</div>
  <button class="btn-gold" id="bar-btn" onclick="submitBar()">Registrer omsetning &#10003;</button>

  <div id="credit-section" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid #222;">
    <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-bottom:8px;">Credits</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <div style="font-size:13px;" id="credit-info">0 tilgjengelig</div>
        <div style="font-size:11px;color:#555;" id="credit-detail"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input class="amount-input" type="number" id="credit-amount" placeholder="Antall" min="1" inputmode="numeric" style="flex:1;">
      <button class="btn-gold" id="credit-btn" onclick="useCredits()" style="flex:1;">Bruk credits</button>
    </div>
    <div class="err" id="credit-err" style="display:none;margin-top:8px;"></div>
  </div>
</div>

<!-- SUCCESS -->
<div id="step-success">
  <div class="success-circle">&#10003;</div>
  <div class="success-title" id="success-title">Registrert!</div>
  <div class="success-detail" id="success-detail"></div>
</div>

<div class="footer">© 2026 SKINS NightClub · skinsvip.no</div>

<script>
  const SB_URL = 'https://hslpwxzrcvobyeccwoao.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHB3eHpyY3ZvYnllY2N3b2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgzMDgsImV4cCI6MjA5MDIwNDMwOH0.4JWT-rs_C6jvldiKNSCkhxAQYuhGa00teIviIw--cmI';
  const { createClient } = supabase;
  const sb = createClient(SB_URL, SB_KEY);

  let ambProfile = null;
  let ambId = null;
  let pointSettings = {};
  let staffRole = null;
  let venueCodes = {};

  // Load settings on startup
  (async () => {
    const [psRes, vcRes] = await Promise.all([
      sb.from('point_settings').select('key,value'),
      sb.from('venue_settings').select('*').limit(1).maybeSingle()
    ]);
    if (psRes.data) psRes.data.forEach(r => pointSettings[r.key] = parseFloat(r.value));
    if (vcRes.data) venueCodes = vcRes.data;
  })();

  // ── Rate limiting for PIN ──
  const RL_KEY = 'skins_pin_rl';
  function getRateLimit() {
    try { return JSON.parse(localStorage.getItem(RL_KEY)) || { attempts: 0, lockedUntil: 0 }; }
    catch { return { attempts: 0, lockedUntil: 0 }; }
  }
  function setRateLimit(rl) { localStorage.setItem(RL_KEY, JSON.stringify(rl)); }

  function getDelay(attempts) {
    if (attempts >= 10) return 300000;  // 5 min
    if (attempts >= 7) return 60000;    // 1 min
    if (attempts >= 5) return 30000;    // 30s
    if (attempts >= 3) return 5000;     // 5s
    return 0;
  }

  // ── PIN validation ──
  async function validatePin() {
    const pinInput = document.getElementById('pin-input');
    const pin = pinInput.value.trim();
    const errEl = document.getElementById('pin-err');
    if (!pin || pin.length !== 4) { showEl('pin-err'); return; }
    hideEl('pin-err');
    pinInput.disabled = true;

    // Check rate limit
    const rl = getRateLimit();
    const now = Date.now();
    if (rl.lockedUntil > now) {
      const secs = Math.ceil((rl.lockedUntil - now) / 1000);
      errEl.textContent = `For mange forsøk. Vent ${secs > 60 ? Math.ceil(secs/60) + ' min' : secs + 's'}.`;
      showEl('pin-err');
      document.getElementById('pin-input').value = '';
      return;
    }

    // Verify via server-side API (codes not exposed to client)
    try {
      const res = await fetch('/api/verify-pin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin })
      });
      const data = await res.json();

      if (data.error === 'rate_limited') {
        const wait = data.retry_after || 60;
        rl.lockedUntil = now + wait * 1000;
        setRateLimit(rl);
        errEl.textContent = `For mange forsøk. Vent ${wait > 60 ? Math.ceil(wait/60) + ' min' : wait + 's'}.`;
        showEl('pin-err');
        document.getElementById('pin-input').value = '';
        pinInput.disabled = false;
        return;
      }

      if (!data.ok) {
        rl.attempts = (rl.attempts || 0) + 1;
        const delay = getDelay(rl.attempts);
        if (delay > 0) rl.lockedUntil = now + delay;
        setRateLimit(rl);

        if (delay > 0) {
          const secs = Math.ceil(delay / 1000);
          errEl.textContent = `Ugyldig kode. Vent ${secs > 60 ? Math.ceil(secs/60) + ' min' : secs + 's'} før neste forsøk.`;
        } else {
          errEl.textContent = 'Ugyldig kode. Prøv igjen.';
        }
        showEl('pin-err');
        document.getElementById('pin-input').value = '';
        pinInput.focus();
        pinInput.disabled = false;
        return;
      }

      // Success — reset rate limit
      setRateLimit({ attempts: 0, lockedUntil: 0 });
      staffRole = data.role;
      pinInput.disabled = false;
      hideEl('step-pin');
      showEl('step-code', 'flex');
      document.getElementById('code-input').focus();

    } catch(e) {
      // Fallback to client-side if API fails
      const roles = [
        { key: 'door_code',    label: 'Dørvakt' },
        { key: 'bar_code',     label: 'Bartender' },
        { key: 'manager_code', label: 'Manager' },
      ];
      const match = roles.find(r => venueCodes[r.key] && venueCodes[r.key] !== 'DISABLED' && venueCodes[r.key] === pin);
      if (!match) {
        rl.attempts = (rl.attempts || 0) + 1;
        const delay = getDelay(rl.attempts);
        if (delay > 0) rl.lockedUntil = now + delay;
        setRateLimit(rl);
        errEl.textContent = 'Ugyldig kode. Prøv igjen.';
        showEl('pin-err');
        pinInput.value = '';
        pinInput.focus();
        pinInput.disabled = false;
        return;
      }
      setRateLimit({ attempts: 0, lockedUntil: 0 });
      staffRole = match.label;
      pinInput.disabled = false;
      hideEl('step-pin');
      showEl('step-code', 'flex');
      document.getElementById('code-input').focus();
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const ambRef = params.get('amb');
    const vipRef = params.get('vip');
    if (ambRef) {
      document.getElementById('code-input').value = ambRef.toUpperCase();
      previewAmbFromUrl(ambRef.toUpperCase());
    } else if (vipRef) {
      document.getElementById('code-input').value = vipRef;
      previewAmbFromUrl(vipRef);
    }
    document.getElementById('pin-input').focus();
    document.getElementById('pin-input').addEventListener('input', () => {
      const val = document.getElementById('pin-input').value.replace(/[^0-9]/g, '');
      document.getElementById('pin-input').value = val;
      if (val.length === 4) validatePin();
    });
    document.getElementById('code-input').addEventListener('keydown', e => { if (e.key === 'Enter') validateCode(); });
    document.getElementById('guest-count').addEventListener('keydown', e => { if (e.key === 'Enter') submitGuests(); });
  });

  const hideEl = (id) => document.getElementById(id).style.display = 'none';
  const showEl = (id, type = 'block') => document.getElementById(id).style.display = type;

  async function previewAmbFromUrl(code) {
    let query = sb.from('profiles').select('id, full_name, ambassador_code');
    query = code.startsWith('SKINS-') || code.length < 36
      ? query.eq('ambassador_code', code)
      : query.eq('id', code);
    const { data } = await query.single();
    if (data) {
      document.getElementById('code-amb-preview-name').textContent = data.full_name || 'Ambassador';
      showEl('code-amb-preview');
    }
  }

  // ── STEG 1: Valider kode ──
  async function validateCode() {
    const btn = document.getElementById('code-btn');
    const errEl = document.getElementById('code-err');
    const raw = document.getElementById('code-input').value.trim().toUpperCase();

    if (!raw) { showEl('code-err'); return; }

    btn.disabled = true;
    btn.textContent = '…';
    hideEl('code-err');

    let query = sb.from('profiles').select('id, full_name, ambassador_code, total_points, total_guests, avatar_url');
    if (raw.startsWith('SKINS-') || raw.length < 36) {
      query = query.eq('ambassador_code', raw);
    } else {
      query = query.eq('id', raw);
    }

    const { data, error } = await query.single();
    btn.disabled = false;
    btn.textContent = 'Bekreft \u2192';

    if (error || !data) {
      showEl('code-err');
      document.getElementById('code-input').focus();
      return;
    }

    ambProfile = data;
    ambId = data.id;
    const name = data.full_name || 'Ambassador';
    const initial = name[0].toUpperCase();
    const avatarHtml = data.avatar_url ? `<img src="${data.avatar_url}" alt="">` : initial;
    document.getElementById('amb-name').textContent = name;
    document.getElementById('amb-name-bar').textContent = name;
    document.getElementById('amb-avatar').innerHTML = avatarHtml;
    document.getElementById('amb-avatar-bar').innerHTML = avatarHtml;
    hideEl('step-code');

    // Dørvakt: kun gjester, Bartender: kun bar, Manager: begge
    const showToggle = staffRole === 'Manager';
    document.getElementById('mode-toggle-guests').style.display = showToggle ? 'flex' : 'none';
    document.getElementById('mode-toggle-bar').style.display = showToggle ? 'flex' : 'none';

    if (staffRole === 'Bartender') {
      showEl('step-bar', 'flex');
      document.getElementById('bar-amount').focus();
      loadCredits();
    } else {
      showEl('step-guests', 'flex');
      document.getElementById('guest-count').focus();
    }
  }

  // ── Load available credits ──
  async function loadCredits() {
    try {
      // Time credits
      const { data: tc } = await sb.from('time_credits')
        .select('remaining')
        .eq('ambassador_id', ambId)
        .gt('remaining', 0)
        .gte('expires_at', new Date().toISOString());
      const tcTotal = (tc || []).reduce((s, c) => s + c.remaining, 0);

      // Regular credits (VIP only has time credits)
      const { data: prof } = await sb.from('profiles')
        .select('credits, role')
        .eq('id', ambId)
        .single();
      const isVip = prof?.role === 'vip';
      const regTotal = isVip ? 0 : Math.floor(prof?.credits || 0);

      const total = tcTotal + regTotal;
      if (total > 0) {
        document.getElementById('credit-section').style.display = '';
        document.getElementById('credit-info').textContent = total + ' credits tilgjengelig';
        const parts = [];
        if (tcTotal) parts.push(tcTotal + ' time credits');
        if (regTotal) parts.push(regTotal + ' vanlige');
        document.getElementById('credit-detail').textContent = parts.join(' + ');
      } else {
        document.getElementById('credit-section').style.display = 'none';
      }
    } catch(e) {
      console.error('loadCredits feil:', e);
    }
  }

  // ── Use credits via API ──
  async function useCredits() {
    const btn = document.getElementById('credit-btn');
    const errEl = document.getElementById('credit-err');
    const amount = parseInt(document.getElementById('credit-amount').value);

    if (!amount || amount < 1) {
      errEl.textContent = 'Angi antall credits.';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Bruker...';

    try {
      const res = await fetch('/api/use-credit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profile_id: ambId, amount })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        errEl.textContent = data.error || 'Feil ved bruk av credits';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Bruk credits';
        return;
      }

      btn.disabled = false;
      btn.textContent = 'Bruk credits';
      document.getElementById('credit-amount').value = '';

      const parts = [];
      if (data.tcUsed) parts.push(data.tcUsed + ' time credits');
      if (data.regUsed) parts.push(data.regUsed + ' vanlige credits');

      hideEl('step-bar');
      showEl('step-success', 'flex');
      document.getElementById('success-title').textContent = amount + ' credit' + (amount > 1 ? 's' : '') + ' brukt!';
      document.getElementById('success-detail').textContent = parts.join(' + ') + ' fra ' + (ambProfile?.full_name || 'Bruker');
    } catch(e) {
      errEl.textContent = 'Nettverksfeil: ' + e.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Bruk credits';
    }
  }

  // ── STEG 2: Registrer gjester ──
  async function submitGuests() {
    const btn = document.getElementById('guest-btn');
    const errEl = document.getElementById('guest-err');
    const count = parseInt(document.getElementById('guest-count').value);
    const type  = document.getElementById('guest-type').value;

    if (!count || count < 1) { showEl('guest-err'); return; }
    hideEl('guest-err');

    btn.disabled = true;
    btn.textContent = 'Lagrer…';

    try {
      const res = await fetch('/api/register-guests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ambassador_id: ambId,
          ambassador_name: ambProfile?.full_name || null,
          guest_count: count,
          event_type: type || 'regular'
        })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        errEl.textContent = 'Feil: ' + (data.error || 'Ukjent feil');
        showEl('guest-err');
        btn.disabled = false;
        btn.textContent = 'Registrer gjester \u2713';
        return;
      }

      if (ambProfile) {
        ambProfile.total_points = data.newPts;
        ambProfile.total_guests = data.newGuests;
      }

      btn.disabled = false;
      btn.textContent = 'Registrer gjester ✓';

      hideEl('step-guests');
      showEl('step-success', 'flex');
      document.getElementById('success-title').textContent = count === 1 ? '1 gjest registrert!' : count + ' gjester registrert!';
      document.getElementById('success-detail').textContent = '+' + data.pts + ' poeng · +' + data.credits + ' credits til ' + (ambProfile?.full_name || 'Ambassador');
      showPtsFloat('+' + data.pts + ' pts');
    } catch(e) {
      errEl.textContent = 'Nettverksfeil: ' + e.message;
      showEl('guest-err');
      btn.disabled = false;
      btn.textContent = 'Registrer gjester \u2713';
    }
  }

  function resetToCode() {
    ambProfile = null;
    ambId = null;
    document.getElementById('code-input').value = '';
    document.getElementById('guest-count').value = '';
    document.getElementById('bar-amount').value = '';
    document.getElementById('bar-preview-val').textContent = '0 poeng · 0 credits';
    hideEl('step-success');
    hideEl('step-guests');
    hideEl('step-bar');
    showEl('step-code', 'flex');
    document.getElementById('code-input').focus();
    history.replaceState(null, '', window.location.pathname);
  }

  // ── Mode switch ──
  function switchMode(mode) {
    if (mode === 'guests') {
      showEl('step-guests', 'flex');
      hideEl('step-bar');
    } else {
      hideEl('step-guests');
      showEl('step-bar', 'flex');
      document.getElementById('amb-name-bar').textContent = ambProfile?.full_name || '–';
      document.getElementById('bar-amount').focus();
    }
  }

  // ── Bar points — flat 100kr = 10pts ──
  function calcBarPoints(amount) {
    const ptsPerHundred = pointSettings.pts_revenue_100 || 10;
    return Math.floor(amount / 100) * ptsPerHundred;
  }

  // ── Bar preview (live update) ──
  document.addEventListener('DOMContentLoaded', () => {
    const barInput = document.getElementById('bar-amount');
    if (barInput) {
      barInput.addEventListener('input', () => {
        const amount = parseInt(barInput.value) || 0;
        const pts = calcBarPoints(amount);
        const creditsPerPts = pointSettings.credits_per_points || 100;
        const credits = Math.min(Math.floor(pts / creditsPerPts), pointSettings.credits_max_night || 25);
        document.getElementById('bar-preview-val').textContent = `${pts} poeng · ${credits} credits`;
      });
      barInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitBar(); });
    }
  });

  // ── Submit bar revenue ──
  async function submitBar() {
    const btn = document.getElementById('bar-btn');
    const errEl = document.getElementById('bar-err');
    const amount = parseInt(document.getElementById('bar-amount').value);

    if (!amount || amount < 1) { showEl('bar-err'); return; }
    hideEl('bar-err');

    btn.disabled = true;
    btn.textContent = 'Lagrer…';

    try {
      const res = await fetch('/api/register-bar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ambassador_id: ambId,
          ambassador_name: ambProfile?.full_name || null,
          amount: amount
        })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        errEl.textContent = 'Feil: ' + (data.error || 'Ukjent feil');
        showEl('bar-err');
        btn.disabled = false;
        btn.textContent = 'Registrer omsetning ✓';
        return;
      }

      btn.disabled = false;
      btn.textContent = 'Registrer omsetning ✓';

      hideEl('step-bar');
      showEl('step-success', 'flex');
      document.getElementById('success-title').textContent = amount.toLocaleString('no') + ' kr registrert!';
      document.getElementById('success-detail').textContent = '+' + data.pts + ' poeng · +' + data.credits + ' credits til ' + (ambProfile?.full_name || 'Ambassador');
      showPtsFloat('+' + data.pts + ' pts');
    } catch(e) {
      errEl.textContent = 'Nettverksfeil: ' + e.message;
      showEl('bar-err');
      btn.disabled = false;
      btn.textContent = 'Registrer omsetning ✓';
    }
  }

  function showPtsFloat(text) {
    const el = document.createElement('div');
    el.className = 'pts-float';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  function resetToGuests() {
    document.getElementById('guest-count').value = '';
    document.getElementById('bar-amount').value = '';
    document.getElementById('bar-preview-val').textContent = '0 poeng · 0 credits';
    hideEl('step-success');
    showEl('step-guests', 'flex');
    document.getElementById('guest-count').focus();
  }
</script>
</body>
</html>
